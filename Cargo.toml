[package]
name = "shopify-draft-proxy"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "Rust runtime for the Shopify Admin GraphQL digital twin / draft proxy"

[lib]
name = "shopify_draft_proxy"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
pretty_assertions = "1"
