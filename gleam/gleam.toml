name = "shopify_draft_proxy"
version = "0.1.0"

description = "Shopify Admin GraphQL digital twin / draft proxy"
licences = ["Apache-2.0"]

# This project is the runtime authority for the larger shopify-draft-proxy
# repository. Parity specs in ../config/parity-specs and conformance fixtures
# in ../fixtures/conformance are shared with the remaining repository tooling.

# Default to the JavaScript target so `gleam test` exercises the runtime that
# Node consumers will use. The Erlang target is run alongside in CI and via
# `gleam test --target erlang`.
target = "javascript"

[javascript]
typescript_declarations = true
runtime = "node"

[dependencies]
gleam_stdlib = ">= 0.60.0 and < 2.0.0"
gleam_json = ">= 3.0.0 and < 4.0.0"
gleam_http = ">= 4.3.0 and < 5.0.0"
gleam_httpc = ">= 5.0.0 and < 6.0.0"
gleam_fetch = ">= 1.4.0 and < 2.0.0"
gleam_javascript = ">= 1.0.0 and < 2.0.0"

[dev_dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
simplifile = ">= 2.0.0 and < 3.0.0"
