mutation ProductVariantsBulkCreateParityPlan($productId: ID!, $variants: [ProductVariantsBulkInput!]!) {
  productVariantsBulkCreate(productId: $productId, variants: $variants) {
    product {
      id
      totalInventory
      tracksInventory
      variants(first: 10) {
        nodes {
          id
          title
          sku
          barcode
          price
          inventoryQuantity
          inventoryItem {
            id
            tracked
            requiresShipping
          }
        }
      }
    }
    productVariants {
      id
      title
      sku
      barcode
      price
      inventoryQuantity
      inventoryItem {
        id
        tracked
        requiresShipping
      }
    }
    userErrors {
      field
      message
    }
  }
}
