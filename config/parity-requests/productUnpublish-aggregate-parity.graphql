mutation ProductUnpublishAggregateParity($input: ProductUnpublishInput!) {
  productUnpublish(input: $input) {
    product {
      id
      publishedOnCurrentPublication
      availablePublicationsCount {
        count
        precision
      }
      resourcePublicationsCount {
        count
        precision
      }
    }
    userErrors {
      field
      message
    }
  }
}
