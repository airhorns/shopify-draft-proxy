mutation DraftOrderDuplicateParityPlan($id: ID) {
  draftOrderDuplicate(id: $id) {
    draftOrder {
      id
      name
      invoiceUrl
      status
      ready
      email
      note
      tags
      customAttributes {
        key
        value
      }
      subtotalPriceSet {
        shopMoney {
          amount
          currencyCode
        }
      }
      totalPriceSet {
        shopMoney {
          amount
          currencyCode
        }
      }
      lineItems(first: 5) {
        nodes {
          id
          title
          quantity
          sku
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
