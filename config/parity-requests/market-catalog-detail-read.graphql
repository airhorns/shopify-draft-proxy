fragment MarketCatalogDetailFields on Catalog {
  __typename
  id
  title
  status
  priceList {
    id
    name
    currency
  }
  publication {
    id
    autoPublish
  }
  operations {
    __typename
  }
  ... on MarketCatalog {
    marketsCount {
      count
      precision
    }
    markets(first: 5) {
      edges {
        cursor
        node {
          id
          name
          handle
          status
          type
        }
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
    }
  }
}

query MarketCatalogDetailRead($catalogId: ID!, $catalogCountLimit: Int) {
  catalog(id: $catalogId) {
    ...MarketCatalogDetailFields
  }
  catalogsCount(type: MARKET, limit: $catalogCountLimit) {
    count
    precision
  }
}
