mutation ProductPublishAggregateParityBlocker($input: ProductPublishInput!) {
  productPublish(input: $input) {
    product {
      id
      publishedOnCurrentPublication
      availablePublicationsCount {
        count
        precision
      }
      resourcePublicationsCount {
        count
        precision
      }
    }
    userErrors {
      field
      message
    }
  }
}
