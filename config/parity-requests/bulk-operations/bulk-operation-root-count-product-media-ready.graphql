query BulkOperationRootCountProductChildrenVisible($id: ID!, $namespace: String!) {
  product(id: $id) {
    id
    media(first: 5) {
      nodes {
        id
        alt
        mediaContentType
        status
      }
    }
    metafields(first: 5, namespace: $namespace) {
      nodes {
        id
        namespace
        key
        value
      }
    }
  }
}
