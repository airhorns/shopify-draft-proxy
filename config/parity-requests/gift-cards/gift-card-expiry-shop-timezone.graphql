mutation GiftCardExpiryShopTimezone(
  $creditId: ID!
  $debitId: ID!
  $customerNotificationId: ID!
  $recipientNotificationId: ID!
  $creditInput: GiftCardCreditInput!
  $debitInput: GiftCardDebitInput!
) {
  credit: giftCardCredit(id: $creditId, creditInput: $creditInput) {
    giftCardCreditTransaction {
      __typename
    }
    userErrors {
      field
      code
      message
    }
  }
  debit: giftCardDebit(id: $debitId, debitInput: $debitInput) {
    giftCardDebitTransaction {
      __typename
    }
    userErrors {
      field
      code
      message
    }
  }
  customerNotification: giftCardSendNotificationToCustomer(id: $customerNotificationId) {
    giftCard {
      id
    }
    userErrors {
      field
      code
      message
    }
  }
  recipientNotification: giftCardSendNotificationToRecipient(id: $recipientNotificationId) {
    giftCard {
      id
    }
    userErrors {
      field
      code
      message
    }
  }
}
