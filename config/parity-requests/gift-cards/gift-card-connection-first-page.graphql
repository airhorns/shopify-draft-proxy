query GiftCardConnectionFirstPage($query: String!) {
  forward: giftCards(first: 2, query: $query, sortKey: ID) {
    nodes {
      lastCharacters
      initialValue {
        amount
        currencyCode
      }
    }
    edges {
      cursor
      node {
        lastCharacters
        initialValue {
          amount
          currencyCode
        }
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
  reverse: giftCards(first: 2, query: $query, sortKey: ID, reverse: true) {
    nodes {
      lastCharacters
      initialValue {
        amount
        currencyCode
      }
    }
    edges {
      cursor
      node {
        lastCharacters
        initialValue {
          amount
          currencyCode
        }
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
  countLimit: giftCardsCount(query: $query, limit: 2) {
    count
    precision
  }
}
