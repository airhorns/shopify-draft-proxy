mutation GiftCardCreateValidation($validCode: String!, $tooLongCode: String!, $missingCustomerId: ID!) {
  zeroInitialValue: giftCardCreate(input: { initialValue: "0" }) {
    giftCard {
      id
    }
    giftCardCode
    userErrors {
      field
      code
      message
    }
  }
  shortCode: giftCardCreate(input: { initialValue: "10", code: "abc" }) {
    giftCard {
      id
    }
    giftCardCode
    userErrors {
      field
      code
      message
    }
  }
  longCode: giftCardCreate(input: { initialValue: "10", code: $tooLongCode }) {
    giftCard {
      id
    }
    giftCardCode
    userErrors {
      field
      code
      message
    }
  }
  invalidCode: giftCardCreate(input: { initialValue: "10", code: "bad!code" }) {
    giftCard {
      id
    }
    giftCardCode
    userErrors {
      field
      code
      message
    }
  }
  missingCustomer: giftCardCreate(input: { initialValue: "10", customerId: $missingCustomerId }) {
    giftCard {
      id
    }
    giftCardCode
    userErrors {
      field
      code
      message
    }
  }
  success: giftCardCreate(input: { initialValue: "10", code: $validCode }) {
    giftCard {
      id
      lastCharacters
      maskedCode
      createdAt
      updatedAt
      initialValue {
        amount
        currencyCode
      }
      balance {
        amount
        currencyCode
      }
    }
    giftCardCode
    userErrors {
      field
      code
      message
    }
  }
  duplicate: giftCardCreate(input: { initialValue: "10", code: $validCode }) {
    giftCard {
      id
    }
    giftCardCode
    userErrors {
      field
      code
      message
    }
  }
  autoGenerated: giftCardCreate(input: { initialValue: "10" }) {
    giftCard {
      id
      lastCharacters
      maskedCode
      createdAt
      updatedAt
      initialValue {
        amount
        currencyCode
      }
      balance {
        amount
        currencyCode
      }
    }
    giftCardCode
    userErrors {
      field
      code
      message
    }
  }
}
