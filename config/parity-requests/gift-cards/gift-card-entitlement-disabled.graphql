mutation GiftCardEntitlementDisabled {
  createError: giftCardCreate(
    input: { initialValue: "0", customerId: "gid://shopify/Customer/disabled-entitlement-customer" }
  ) {
    giftCard {
      id
    }
    giftCardCode
    userErrors {
      field
      code
      message
    }
  }
  updateError: giftCardUpdate(id: "gid://shopify/GiftCard/disabled-entitlement-card", input: { note: "x" }) {
    giftCard {
      id
    }
    userErrors {
      field
      code
      message
    }
  }
  creditError: giftCardCredit(
    id: "gid://shopify/GiftCard/disabled-entitlement-card"
    creditInput: { creditAmount: { amount: "-1", currencyCode: CAD } }
  ) {
    giftCardCreditTransaction {
      id
    }
    userErrors {
      field
      code
      message
    }
  }
  debitError: giftCardDebit(
    id: "gid://shopify/GiftCard/disabled-entitlement-card"
    debitInput: { debitAmount: { amount: "9999", currencyCode: CAD } }
  ) {
    giftCardDebitTransaction {
      id
    }
    userErrors {
      field
      code
      message
    }
  }
  deactivateError: giftCardDeactivate(id: "gid://shopify/GiftCard/disabled-entitlement-card") {
    giftCard {
      id
    }
    userErrors {
      field
      code
      message
    }
  }
  notificationCustomerError: giftCardSendNotificationToCustomer(
    id: "gid://shopify/GiftCard/disabled-entitlement-card"
  ) {
    giftCard {
      id
    }
    userErrors {
      field
      code
      message
    }
  }
  notificationRecipientError: giftCardSendNotificationToRecipient(
    id: "gid://shopify/GiftCard/disabled-entitlement-card"
  ) {
    giftCard {
      id
    }
    userErrors {
      field
      code
      message
    }
  }
}
