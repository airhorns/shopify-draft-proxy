mutation GiftCardTrialShopAssignment($customerId: ID!, $recipientId: ID!, $updateGiftCardId: ID!) {
  createCustomerAssignment: giftCardCreate(input: { initialValue: "10", customerId: $customerId }) {
    giftCard {
      id
    }
    giftCardCode
    userErrors {
      field
      code
      message
    }
  }
  createRecipientAssignment: giftCardCreate(input: { initialValue: "10", recipientAttributes: { id: $recipientId } }) {
    giftCard {
      id
    }
    giftCardCode
    userErrors {
      field
      code
      message
    }
  }
  updateCustomerAssignment: giftCardUpdate(id: $updateGiftCardId, input: { customerId: $customerId }) {
    giftCard {
      id
    }
    userErrors {
      field
      code
      message
    }
  }
  updateRecipientAssignment: giftCardUpdate(
    id: $updateGiftCardId
    input: { recipientAttributes: { id: $recipientId } }
  ) {
    giftCard {
      id
    }
    userErrors {
      field
      code
      message
    }
  }
}
