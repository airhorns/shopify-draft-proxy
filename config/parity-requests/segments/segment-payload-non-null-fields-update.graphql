mutation SegmentPayloadNonNullFieldsUpdate($id: ID!, $name: String, $query: String) {
  segmentUpdate(id: $id, name: $name, query: $query) {
    segment {
      id
      name
      query
      creationDate
      lastEditDate
      tagMigrated
      valid
      percentageSnapshot
      percentageSnapshotUpdatedAt
      translation
      author {
        name
      }
    }
    userErrors {
      field
      message
    }
  }
}
