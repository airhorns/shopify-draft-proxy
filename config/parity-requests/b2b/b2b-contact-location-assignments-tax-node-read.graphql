query B2BContactLocationAssignmentsNodeRead($id: ID!) {
  node(id: $id) {
    ... on CompanyAddress {
      id
      address1
      city
      countryCode
    }
    ... on CompanyContactRoleAssignment {
      id
      companyContact {
        id
        title
      }
      role {
        id
        name
      }
      companyLocation {
        id
        name
      }
    }
    ... on CompanyContact {
      id
      title
    }
    ... on CompanyContactRole {
      id
      name
    }
    ... on CompanyLocation {
      id
      name
    }
  }
}
