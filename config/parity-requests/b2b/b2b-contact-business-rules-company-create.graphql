mutation B2BContactBusinessRulesCompanyCreate($input: CompanyCreateInput!) {
  companyCreate(input: $input) {
    company {
      id
      name
      contactsCount {
        count
      }
      mainContact {
        id
        title
        isMainContact
        roleAssignments(first: 5) {
          nodes {
            id
            role {
              id
              name
            }
            companyLocation {
              id
              name
            }
          }
        }
      }
      locations(first: 5) {
        nodes {
          id
          name
        }
      }
      contactRoles(first: 5) {
        nodes {
          id
          name
        }
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
