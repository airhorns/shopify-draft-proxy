mutation B2BCompanyLifecycleAssignMainContact($companyId: ID!, $companyContactId: ID!) {
  companyAssignMainContact(companyId: $companyId, companyContactId: $companyContactId) {
    company {
      id
      mainContact {
        id
        title
        isMainContact
      }
      contacts(first: 5) {
        nodes {
          id
          title
          isMainContact
        }
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
