mutation AssignCustomerAsContactErrorBranchAssign($companyId: ID!, $customerId: ID!) {
  companyAssignCustomerAsContact(companyId: $companyId, customerId: $customerId) {
    companyContact {
      id
      isMainContact
      customer {
        id
        email
      }
      company {
        id
        name
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
