mutation B2BLocationInputNormalizationCompanyCreate($input: CompanyCreateInput!) {
  companyCreate(input: $input) {
    company {
      id
      name
      locations(first: 5) {
        nodes {
          id
          name
          phone
          locale
        }
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
