mutation B2BContactUpdateCustomerReadbackContactCreate($companyId: ID!, $input: CompanyContactInput!) {
  companyContactCreate(companyId: $companyId, input: $input) {
    companyContact {
      id
      customer {
        id
        email
        firstName
        lastName
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
