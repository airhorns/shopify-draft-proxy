mutation B2BRevokeRoleScopeContactRevokeRoles($companyContactId: ID!, $roleAssignmentIds: [ID!]!, $revokeAll: Boolean) {
  companyContactRevokeRoles(
    companyContactId: $companyContactId
    roleAssignmentIds: $roleAssignmentIds
    revokeAll: $revokeAll
  ) {
    revokedRoleAssignmentIds
    userErrors {
      field
      message
      code
    }
  }
}
