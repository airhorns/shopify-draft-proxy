mutation B2BContactMissingEmailCompanyCreate($input: CompanyCreateInput!) {
  companyCreate(input: $input) {
    company {
      id
      name
      externalId
      contacts(first: 5) {
        nodes {
          id
          title
          locale
          isMainContact
        }
      }
      locations(first: 5) {
        nodes {
          id
          name
        }
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
