mutation B2BMixedOverlayLocationCreate($companyId: ID!, $input: CompanyLocationInput!) {
  companyLocationCreate(companyId: $companyId, input: $input) {
    companyLocation {
      id
      name
      externalId
      company {
        id
        name
        externalId
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
