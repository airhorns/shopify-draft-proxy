query MetafieldDefinitionsParityPlan($ownerType: MetafieldOwnerType!, $namespace: String, $first: Int = 10) {
  metafieldDefinitions(ownerType: $ownerType, namespace: $namespace, first: $first) {
    nodes {
      id
      name
      namespace
      key
      ownerType
      pinnedPosition
      validationStatus
      type {
        name
      }
      validations {
        name
        value
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}
