mutation OrderMarkAsPaidParityPlan($input: OrderMarkAsPaidInput!) {
  orderMarkAsPaid(input: $input) {
    order {
      id
      name
      displayFinancialStatus
      canMarkAsPaid
      transactions(first: 5) {
        id
        kind
        status
        gateway
        createdAt
        amountSet {
          shopMoney {
            amount
            currencyCode
          }
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
