query MetafieldsSetDownstreamRead($id: ID!) {
  product(id: $id) {
    id
    primarySpec: metafield(namespace: "custom", key: "material") {
      id
      namespace
      key
      type
      value
      compareDigest
    }
    origin: metafield(namespace: "details", key: "origin") {
      id
      namespace
      key
      type
      value
      compareDigest
    }
    season: metafield(namespace: "details", key: "season") {
      id
      namespace
      key
      type
      value
      compareDigest
    }
    metafields(first: 10) {
      nodes {
        id
        namespace
        key
        type
        value
        compareDigest
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
    }
  }
}
