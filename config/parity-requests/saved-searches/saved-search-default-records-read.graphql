query SavedSearchDefaultRecordsRead {
  orderSavedSearches(first: 10) {
    nodes {
      id
      legacyResourceId
      name
      query
      resourceType
      searchTerms
      filters {
        key
        value
      }
    }
  }
  draftOrderSavedSearches(first: 10) {
    nodes {
      id
      legacyResourceId
      name
      query
      resourceType
      searchTerms
      filters {
        key
        value
      }
    }
  }
}
