mutation SavedSearchResourceRootsCreate(
  $product: SavedSearchCreateInput!
  $collection: SavedSearchCreateInput!
  $customer: SavedSearchCreateInput!
  $order: SavedSearchCreateInput!
  $draftOrder: SavedSearchCreateInput!
  $file: SavedSearchCreateInput!
  $discountRedeemCode: SavedSearchCreateInput!
) {
  product: savedSearchCreate(input: $product) {
    savedSearch {
      id
      legacyResourceId
      name
      query
      resourceType
      searchTerms
      filters {
        key
        value
      }
    }
    userErrors {
      field
      message
    }
  }
  collection: savedSearchCreate(input: $collection) {
    savedSearch {
