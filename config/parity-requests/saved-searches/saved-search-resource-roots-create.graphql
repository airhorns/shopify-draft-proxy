    userErrors {
      field
      message
    }
  }
  file: savedSearchCreate(input: $file) {
    savedSearch {
      id
      legacyResourceId
      name
      query
      resourceType
      searchTerms
      filters {
        key
        value
      }
    }
    userErrors {
      field
      message
    }
  }
  discountRedeemCode: savedSearchCreate(input: $discountRedeemCode) {
