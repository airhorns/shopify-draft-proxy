query SavedSearchResourceRootsRead {
  products: productSavedSearches(first: 20) {
    nodes {
      id
      legacyResourceId
      name
      query
      resourceType
      searchTerms
      filters {
        key
        value
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
    }
  }
