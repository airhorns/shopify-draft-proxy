query SavedSearchLocalStagingReadAfterCreate {
  productSavedSearches(first: 1) {
    nodes {
      id
      name
      query
      resourceType
      searchTerms
      filters {
        key
        value
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
  customerSavedSearches(first: 3) {
    nodes {
      id
      name
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}
