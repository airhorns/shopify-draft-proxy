query SavedSearchFilterProjectionReadAfterCreate {
  productSavedSearches(first: 5, reverse: true) {
    nodes {
      id
      name
      query
      resourceType
      searchTerms
      filters {
        key
        value
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}
