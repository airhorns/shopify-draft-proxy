query WebhookSubscriptionDetailRead($id: ID!) {
  webhookSubscription(id: $id) {
    id
    topic
    format
    includeFields
    metafieldNamespaces
    filter
    createdAt
    updatedAt
    endpoint {
      __typename
      ... on WebhookHttpEndpoint {
        callbackUrl
      }
      ... on WebhookEventBridgeEndpoint {
        arn
      }
      ... on WebhookPubSubEndpoint {
        pubSubProject
        pubSubTopic
      }
    }
  }
}
