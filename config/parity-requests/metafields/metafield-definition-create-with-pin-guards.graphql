mutation MetafieldDefinitionCreateWithPinGuards(
  $namespace: String!
  $categoryId: String!
  $standardTemplateId: ID!
) {
  create50: metafieldDefinitionCreate(
    definition: {
      ownerType: PRODUCT
      namespace: $namespace
      key: "pin_50"
      name: "Create with pin position 50"
      type: "single_line_text_field"
      pin: true
    }
  ) {
    createdDefinition {
      id
      key
      pinnedPosition
    }
    userErrors {
      field
      message
      code
    }
  }
  overCapCreate: metafieldDefinitionCreate(
    definition: {
      ownerType: PRODUCT
      namespace: $namespace
      key: "over_cap"
      name: "Create over pin cap"
      type: "single_line_text_field"
      pin: true
    }
  ) {
    createdDefinition {
      id
      key
      pinnedPosition
    }
    userErrors {
      field
      message
      code
    }
  }
  constrainedCreate: metafieldDefinitionCreate(
    definition: {
      ownerType: PRODUCT
      namespace: $namespace
      key: "constrained"
      name: "Create constrained pin"
      type: "single_line_text_field"
      constraints: { key: "category", values: [$categoryId] }
      pin: true
    }
  ) {
    createdDefinition {
      id
      key
      pinnedPosition
      constraints {
        key
      }
    }
    userErrors {
      field
      message
      code
    }
  }
  standardConstrainedEnable: standardMetafieldDefinitionEnable(
    ownerType: PRODUCT
    id: $standardTemplateId
    pin: true
  ) {
    createdDefinition {
      id
      namespace
      key
      pinnedPosition
    }
    userErrors {
      field
      message
      code
    }
  }
}
