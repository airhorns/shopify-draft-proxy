mutation StandardMetafieldDefinitionEnableDeprecatedCondition {
  standardMetafieldDefinitionEnable(
    ownerType: PRODUCT
    id: "gid://shopify/StandardMetafieldDefinitionTemplate/2"
    useAsCollectionCondition: true
  ) {
    createdDefinition {
      namespace
      key
    }
    userErrors {
      field
      message
      code
    }
  }
}
