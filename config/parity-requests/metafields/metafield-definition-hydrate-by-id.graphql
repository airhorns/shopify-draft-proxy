query MetafieldDefinitionHydrateById($id: ID!) {
  metafieldDefinition(id: $id) {
    id
    name
    namespace
    key
    ownerType
    type {
      name
      category
    }
    description
    validations {
      name
      value
    }
    access {
      admin
      storefront
      customerAccount
    }
    capabilities {
      adminFilterable {
        enabled
        eligible
        status
      }
      smartCollectionCondition {
        enabled
        eligible
      }
      uniqueValues {
        enabled
        eligible
      }
    }
    constraints {
      key
      values(first: 50) {
        nodes {
          value
        }
        pageInfo {
          hasNextPage
          hasPreviousPage
          startCursor
          endCursor
        }
      }
    }
    pinnedPosition
    validationStatus
    metafieldsCount
  }
}
