mutation MetafieldReferenceFieldsMetaobjectDefinitionCreate(
  $definition: MetaobjectDefinitionCreateInput!
) {
  metaobjectDefinitionCreate(definition: $definition) {
    metaobjectDefinition {
      id
      type
      name
      displayNameKey
      fieldDefinitions {
        key
        name
        required
        type {
          name
          category
        }
        validations {
          name
          value
        }
      }
    }
    userErrors {
      field
      message
      code
      elementKey
      elementIndex
    }
  }
}
