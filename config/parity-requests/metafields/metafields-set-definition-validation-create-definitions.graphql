mutation MetafieldsSetDefinitionValidationCreateDefinitions(
  $quantityMin: MetafieldDefinitionInput!
  $quantityMax: MetafieldDefinitionInput!
  $sku: MetafieldDefinitionInput!
  $color: MetafieldDefinitionInput!
  $rating: MetafieldDefinitionInput!
  $launchDate: MetafieldDefinitionInput!
  $startsAt: MetafieldDefinitionInput!
) {
  quantityMin: metafieldDefinitionCreate(definition: $quantityMin) {
    createdDefinition {
      id
      namespace
      key
      ownerType
      type {
        name
        category
      }
      validations {
        name
        value
      }
    }
    userErrors {
      field
      message
      code
    }
  }
  quantityMax: metafieldDefinitionCreate(definition: $quantityMax) {
    createdDefinition {
      id
      namespace
      key
      ownerType
      type {
        name
        category
      }
      validations {
