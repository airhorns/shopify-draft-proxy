        value
      }
    }
    userErrors {
      field
      message
      code
    }
  }
  sku: metafieldDefinitionCreate(definition: $sku) {
    createdDefinition {
      id
      namespace
      key
      ownerType
      type {
        name
        category
      }
      validations {
        name
        value
      }
    }
    userErrors {
      field
      message
      code
    }
  }
  color: metafieldDefinitionCreate(definition: $color) {
    createdDefinition {
      id
      namespace
      key
      ownerType
      type {
        name
        category
      }
      validations {
        name
        value
      }
    }
    userErrors {
      field
      message
      code
    }
  }
  rating: metafieldDefinitionCreate(definition: $rating) {
    createdDefinition {
      id
      namespace
      key
      ownerType
      type {
        name
        category
      }
      validations {
        name
        value
      }
    }
    userErrors {
      field
      message
      code
    }
  }
  launchDate: metafieldDefinitionCreate(definition: $launchDate) {
    createdDefinition {
      id
      namespace
      key
      ownerType
      type {
        name
        category
      }
      validations {
        name
        value
      }
    }
    userErrors {
      field
      message
      code
    }
  }
  startsAt: metafieldDefinitionCreate(definition: $startsAt) {
    createdDefinition {
      id
      namespace
      key
      ownerType
      type {
        name
        category
      }
      validations {
        name
        value
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
