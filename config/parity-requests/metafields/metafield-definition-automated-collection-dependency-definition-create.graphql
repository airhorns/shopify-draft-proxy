mutation MetafieldDefinitionAutomatedCollectionDefinitionCreate(
  $definition: MetafieldDefinitionInput!
) {
  metafieldDefinitionCreate(definition: $definition) {
    createdDefinition {
      id
      namespace
      key
      ownerType
      type {
        name
      }
      capabilities {
        smartCollectionCondition {
          enabled
          eligible
        }
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
