query MetafieldDefinitionCatalogConnectionFirstPage($namespace: String!) {
  firstPage: metafieldDefinitions(ownerType: PRODUCT, namespace: $namespace, first: 1) {
    nodes {
      id
      key
      name
    }
    edges {
      cursor
      node {
        id
        key
        name
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}
