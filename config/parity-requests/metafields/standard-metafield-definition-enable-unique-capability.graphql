mutation StandardMetafieldDefinitionEnableUniqueCapability {
  standardMetafieldDefinitionEnable(
    ownerType: PRODUCT
    id: "gid://shopify/StandardMetafieldDefinitionTemplate/2"
    capabilities: { uniqueValues: { enabled: true } }
  ) {
    createdDefinition {
      namespace
      key
    }
    userErrors {
      field
      message
      code
    }
  }
}
