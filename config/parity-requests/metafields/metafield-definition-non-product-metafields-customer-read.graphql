query MetafieldDefinitionNonProductCustomerMetafieldsRead($id: ID!, $namespace: String!, $key: String!) {
  customer(id: $id) {
    id
    metafield(namespace: $namespace, key: $key) {
      id
      namespace
      key
      type
      value
    }
    metafields(first: 5, namespace: $namespace) {
      nodes {
        id
        namespace
        key
        type
        value
      }
    }
  }
}
