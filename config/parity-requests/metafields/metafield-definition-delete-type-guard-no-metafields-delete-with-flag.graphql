mutation MetafieldDefinitionDeleteTypeGuardNoMetafieldsDeleteWithFlag(
  $id: ID!
  $deleteAllAssociatedMetafields: Boolean!
) {
  metafieldDefinitionDelete(id: $id, deleteAllAssociatedMetafields: $deleteAllAssociatedMetafields) {
    deletedDefinitionId
    deletedDefinition {
      ownerType
      namespace
      key
    }
    userErrors {
      __typename
      field
      message
      code
    }
  }
}
