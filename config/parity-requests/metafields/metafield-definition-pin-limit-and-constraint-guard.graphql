mutation MetafieldDefinitionPinLimitAndConstraintGuard($namespace: String!, $categoryId: String!) {
  create50: metafieldDefinitionCreate(
    definition: {
      ownerType: PRODUCT
      namespace: $namespace
      key: "pin_50"
      name: "Pin limit position 50"
      type: "single_line_text_field"
    }
  ) {
    createdDefinition {
      id
      key
      pinnedPosition
    }
    userErrors {
      field
      message
      code
    }
  }
  pin50: metafieldDefinitionPin(identifier: { ownerType: PRODUCT, namespace: $namespace, key: "pin_50" }) {
    pinnedDefinition {
      id
      key
      pinnedPosition
    }
    userErrors {
      field
      message
      code
    }
  }
  create51: metafieldDefinitionCreate(
    definition: {
      ownerType: PRODUCT
      namespace: $namespace
      key: "pin_51"
      name: "Pin limit position 51"
      type: "single_line_text_field"
    }
  ) {
    createdDefinition {
      id
      key
      pinnedPosition
    }
    userErrors {
      field
      message
      code
    }
  }
  pin51: metafieldDefinitionPin(identifier: { ownerType: PRODUCT, namespace: $namespace, key: "pin_51" }) {
    pinnedDefinition {
      id
      key
      pinnedPosition
    }
    userErrors {
      field
      message
      code
    }
  }
  constrainedCreate: metafieldDefinitionCreate(
    definition: {
      ownerType: PRODUCT
      namespace: $namespace
      key: "constrained"
      name: "Constrained pin target"
      type: "single_line_text_field"
      constraints: { key: "category", values: [$categoryId] }
    }
  ) {
    createdDefinition {
      id
      key
      constraints {
        key
      }
    }
    userErrors {
      field
      message
      code
    }
  }
  constrainedPin: metafieldDefinitionPin(
    identifier: { ownerType: PRODUCT, namespace: $namespace, key: "constrained" }
  ) {
    pinnedDefinition {
      id
      key
      pinnedPosition
    }
    userErrors {
      field
      message
      code
    }
  }
}
