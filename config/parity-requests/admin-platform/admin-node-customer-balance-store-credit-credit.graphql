mutation AdminNodeCustomerBalanceStoreCreditCredit(
  $id: ID!
  $creditInput: StoreCreditAccountCreditInput!
) {
  storeCreditAccountCredit(id: $id, creditInput: $creditInput) {
    storeCreditAccountTransaction {
      id
      __typename
      amount {
        amount
        currencyCode
      }
      balanceAfterTransaction {
        amount
        currencyCode
      }
      event
      origin
      remainingAmount {
        amount
        currencyCode
      }
      account {
        id
        balance {
          amount
          currencyCode
        }
        owner {
          ... on Customer {
            id
            email
          }
        }
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
