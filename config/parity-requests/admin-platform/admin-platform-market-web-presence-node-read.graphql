query AdminPlatformMarketWebPresenceNodeRead($ids: [ID!]!) {
  nodes(ids: $ids) {
    ... on Node {
      id
    }
    ... on MarketWebPresence {
      subfolderSuffix
      domain {
        id
        host
        url
        sslEnabled
      }
      rootUrls {
        locale
        url
      }
      defaultLocale {
        locale
        name
        primary
        published
      }
      alternateLocales {
        locale
        name
        primary
        published
      }
      markets(first: 5) {
        edges {
          cursor
          node {
            id
            name
            handle
            status
            type
          }
        }
        pageInfo {
          hasNextPage
          hasPreviousPage
          startCursor
          endCursor
        }
      }
    }
  }
}
