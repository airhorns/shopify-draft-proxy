query StorePropertiesBusinessEntitiesCatalog {
  businessEntities {
    id
    displayName
    companyName
    primary
    archived
    address {
      address1
      address2
      city
      countryCode
      province
      zip
    }
    shopifyPaymentsAccount {
      id
      activated
      country
      defaultCurrency
      onboardable
    }
  }
}
