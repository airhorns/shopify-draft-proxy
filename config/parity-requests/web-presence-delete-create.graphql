mutation WebPresenceDeleteParityCreate($input: WebPresenceCreateInput!) {
  webPresenceCreate(input: $input) {
    webPresence {
      id
      subfolderSuffix
      domain {
        id
        host
        url
        sslEnabled
      }
      rootUrls {
        locale
        url
      }
      defaultLocale {
        locale
        name
        primary
        published
      }
      alternateLocales {
        locale
        name
        primary
        published
      }
      markets(first: 5) {
        nodes {
          id
          name
          handle
          status
          type
        }
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
