query ProductDeleteMediaDownstreamRead($productId: ID!) {
  product(id: $productId) {
    id
    media(first: 10) {
      nodes {
        id
        alt
        mediaContentType
        status
        preview {
          image {
            url
          }
        }
        ... on MediaImage {
          image {
            url
          }
        }
      }
    }
  }
}
