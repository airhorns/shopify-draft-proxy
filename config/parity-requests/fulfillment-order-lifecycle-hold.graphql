mutation FulfillmentOrderHoldLifecycle($id: ID!, $fulfillmentHold: FulfillmentOrderHoldInput!) {
  fulfillmentOrderHold(id: $id, fulfillmentHold: $fulfillmentHold) {
    fulfillmentHold {
      id
      handle
      reason
      reasonNotes
      displayReason
      heldByRequestingApp
    }
    fulfillmentOrder {
      id
      status
      requestStatus
      fulfillAt
      fulfillBy
      supportedActions {
        action
      }
      assignedLocation {
        name
        location {
          id
          name
        }
      }
      fulfillmentHolds {
        id
        handle
        reason
        reasonNotes
        displayReason
        heldByRequestingApp
      }
      lineItems(first: 5) {
        nodes {
          id
          totalQuantity
          remainingQuantity
          lineItem {
            id
            title
          }
        }
      }
    }
    remainingFulfillmentOrder {
      id
      status
      requestStatus
      fulfillAt
      fulfillBy
      supportedActions {
        action
      }
      assignedLocation {
        name
        location {
          id
          name
        }
      }
      fulfillmentHolds {
        id
        handle
        reason
        reasonNotes
        displayReason
        heldByRequestingApp
      }
      lineItems(first: 5) {
        nodes {
          id
          totalQuantity
          remainingQuantity
          lineItem {
            id
            title
          }
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
