query StorefrontDiscoveryPagination($query: String!, $after: String) {
  pagination: search(first: 1, after: $after, query: $query, prefix: LAST, types: [PAGE]) {
    nodes {
      __typename
      ... on Page {
        id
        title
        handle
        bodySummary
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    totalCount
  }
}
