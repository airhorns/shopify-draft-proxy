mutation StorefrontCartGiftCardCodesRemove($cartId: ID!, $appliedGiftCardIds: [ID!]!) {
  cartGiftCardCodesRemove(cartId: $cartId, appliedGiftCardIds: $appliedGiftCardIds) {
    cart {
      id
      updatedAt
      appliedGiftCards {
        id
        lastCharacters
        amountUsed {
          amount
          currencyCode
        }
        presentmentAmountUsed {
          amount
          currencyCode
        }
        balance {
          amount
          currencyCode
        }
      }
      cost {
        subtotalAmount {
          amount
          currencyCode
        }
        totalAmount {
          amount
          currencyCode
        }
      }
      estimatedCost {
        subtotalAmount {
          amount
          currencyCode
        }
        totalAmount {
          amount
          currencyCode
        }
      }
    }
    userErrors {
      field
      message
      code
    }
    warnings {
      code
      message
      target
    }
  }
}
