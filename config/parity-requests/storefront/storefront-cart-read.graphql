query StorefrontCartRead($id: ID!) {
  cart(id: $id) {
    ...StorefrontCartFields
  }
}

fragment StorefrontCartFields on Cart {
  id
  createdAt
  updatedAt
  checkoutUrl
  totalQuantity
  note
  attributes {
    key
    value
  }
  buyerIdentity {
    countryCode
    email
    phone
    customer {
      id
      email
      firstName
      lastName
      displayName
    }
    purchasingCompany {
      company {
        id
        name
      }
      location {
        id
        name
      }
    }
  }
  discountCodes {
    code
    applicable
  }
  discountAllocations {
    __typename
    discountedAmount {
      amount
      currencyCode
    }
    targetType
    ... on CartCodeDiscountAllocation {
      code
    }
    ... on CartAutomaticDiscountAllocation {
      title
    }
    ... on CartCustomDiscountAllocation {
      title
    }
  }
  appliedGiftCards {
    id
    lastCharacters
    amountUsed {
      amount
      currencyCode
    }
    presentmentAmountUsed {
      amount
      currencyCode
    }
    balance {
      amount
      currencyCode
    }
  }
  metafield(namespace: "custom", key: "note") {
    id
    namespace
    key
    value
    type
    list
    createdAt
    updatedAt
  }
  metafields(
    identifiers: [{ namespace: "custom", key: "note" }, { namespace: "custom", key: "count" }]
  ) {
    id
    namespace
    key
    value
    type
    list
    createdAt
    updatedAt
  }
  lines(first: 50) {
    edges {
      cursor
      node {
        ...StorefrontCartLineFields
      }
    }
    nodes {
      ...StorefrontCartLineFields
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
  cost {
    checkoutChargeAmount {
      amount
      currencyCode
    }
    subtotalAmount {
      amount
      currencyCode
    }
    subtotalAmountEstimated
    totalAmount {
      amount
      currencyCode
    }
    totalAmountEstimated
    totalDutyAmount {
      amount
      currencyCode
    }
    totalDutyAmountEstimated
    totalTaxAmount {
      amount
      currencyCode
    }
    totalTaxAmountEstimated
  }
  estimatedCost {
    checkoutChargeAmount {
      amount
      currencyCode
    }
    subtotalAmount {
      amount
      currencyCode
    }
    totalAmount {
      amount
      currencyCode
    }
    totalDutyAmount {
      amount
      currencyCode
    }
    totalTaxAmount {
      amount
      currencyCode
    }
  }
}

fragment StorefrontCartLineFields on BaseCartLine {
  id
  quantity
  attributes {
    key
    value
  }
  merchandise {
    ... on ProductVariant {
      id
      title
      availableForSale
      quantityAvailable
      price {
        amount
        currencyCode
      }
    }
  }
  sellingPlanAllocation {
    sellingPlan {
      id
      name
    }
  }
  cost {
    amountPerQuantity {
      amount
      currencyCode
    }
    compareAtAmountPerQuantity {
      amount
      currencyCode
    }
    subtotalAmount {
      amount
      currencyCode
    }
    totalAmount {
      amount
      currencyCode
    }
  }
  estimatedCost {
    amount {
      amount
      currencyCode
    }
    compareAtAmount {
      amount
      currencyCode
    }
    subtotalAmount {
      amount
      currencyCode
    }
    totalAmount {
      amount
      currencyCode
    }
  }
}
