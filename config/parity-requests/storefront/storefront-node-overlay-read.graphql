query StorefrontNodeOverlayRead($menuId: ID!, $ids: [ID!]!) {
  singleMenu: node(id: $menuId) {
    __typename
    id
    ... on Menu {
      handle
      title
      itemsCount
    }
  }
  mixed: nodes(ids: $ids) {
    __typename
    id
    ... on Product {
      handle
      title
    }
    ... on Collection {
      handle
      title
    }
    ... on Page {
      handle
      title
    }
    ... on Menu {
      handle
      title
      itemsCount
    }
  }
}
