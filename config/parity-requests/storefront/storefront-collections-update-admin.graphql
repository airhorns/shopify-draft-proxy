mutation StorefrontCollectionsUpdate(
  $collection: CollectionInput!
  $product: ProductUpdateInput!
) {
  collectionUpdate(input: $collection) {
    collection {
      id
      title
      handle
      descriptionHtml
      seo {
        title
        description
      }
      image {
        url
        altText
      }
    }
    userErrors {
      field
      message
    }
  }
  productUpdate(product: $product) {
    product {
      id
      title
      handle
    }
    userErrors {
      field
      message
    }
  }
}
