mutation StorefrontCustomerDefaultAddressUpdate($token: String!, $addressId: ID!) {
  customerDefaultAddressUpdate(customerAccessToken: $token, addressId: $addressId) {
    customer {
      id
      email
      firstName
      lastName
      displayName
      defaultAddress {
        id
        address1
        city
        country
      }
      addresses(first: 5) {
        nodes {
          id
          address1
          city
          country
        }
        pageInfo {
          hasNextPage
          hasPreviousPage
          startCursor
          endCursor
        }
      }
    }
    customerUserErrors {
      field
      message
      code
    }
    userErrors {
      field
      message
    }
  }
}
