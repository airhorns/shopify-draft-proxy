query StorefrontCatalogUpdatedRead($id: ID!, $oldHandle: String!, $newHandle: String!, $query: String!) {
  oldHandle: productByHandle(handle: $oldHandle) {
    id
  }
  byId: product(id: $id) {
    id
    title
    handle
    updatedAt
  }
  byNewHandle: productByHandle(handle: $newHandle) {
    id
    title
    handle
  }
  products(first: 2, query: $query, sortKey: TITLE) {
    nodes {
      id
      title
      handle
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}
