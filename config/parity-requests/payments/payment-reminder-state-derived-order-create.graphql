mutation PaymentReminderStateDerivedOrderCreate($order: OrderCreateOrderInput!) {
  orderCreate(order: $order) {
    order {
      id
      email
      displayFinancialStatus
      closed
      closedAt
      cancelledAt
      lineItems(first: 1) {
        nodes {
          id
          title
          quantity
          sellingPlan {
            name
          }
        }
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
