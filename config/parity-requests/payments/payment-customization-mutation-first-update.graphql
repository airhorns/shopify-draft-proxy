mutation PaymentCustomizationMutationFirstUpdate($id: ID!, $input: PaymentCustomizationInput!) {
  paymentCustomizationUpdate(id: $id, paymentCustomization: $input) {
    paymentCustomization {
      id
      title
      enabled
      functionId
      metafields(first: 5) {
        edges {
          node {
            id
            namespace
            key
            type
            value
            createdAt
            updatedAt
          }
        }
      }
    }
    userErrors {
      field
      code
      message
    }
  }
}
