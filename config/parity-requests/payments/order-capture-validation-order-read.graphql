query OrderCaptureValidationOrderRead($id: ID!) {
  order(id: $id) {
    id
    displayFinancialStatus
    capturable
    totalCapturable
    totalCapturableSet {
      shopMoney { amount currencyCode }
      presentmentMoney { amount currencyCode }
    }
    totalOutstandingSet {
      shopMoney { amount currencyCode }
      presentmentMoney { amount currencyCode }
    }
    totalReceivedSet {
      shopMoney { amount currencyCode }
      presentmentMoney { amount currencyCode }
    }
    netPaymentSet {
      shopMoney { amount currencyCode }
      presentmentMoney { amount currencyCode }
    }
  }
}
