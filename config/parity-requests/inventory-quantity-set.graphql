mutation InventoryQuantitySet($input: InventorySetQuantitiesInput!) {
  inventorySetQuantities(input: $input) {
    inventoryAdjustmentGroup {
      reason
      referenceDocumentUri
      changes {
        name
        delta
        quantityAfterChange
        ledgerDocumentUri
        location {
          id
          name
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
