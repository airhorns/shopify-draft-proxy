query ProductMetafieldsRead($id: ID!, $namespace: String!, $key: String!) {
  product(id: $id) {
    id
    title
    metafield(namespace: $namespace, key: $key) {
      id
      namespace
      key
      type
      value
    }
    metafields(first: 5) {
      edges {
        node {
          id
          namespace
          key
          type
          value
        }
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
    }
  }
}
