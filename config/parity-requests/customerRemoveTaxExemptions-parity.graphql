mutation CustomerRemoveTaxExemptionsParity($customerId: ID!, $taxExemptions: [TaxExemption!]!) {
  customerRemoveTaxExemptions(customerId: $customerId, taxExemptions: $taxExemptions) {
    customer {
      id
      firstName
      lastName
      displayName
      email
      taxExempt
      taxExemptions
      tags
      defaultEmailAddress {
        emailAddress
      }
      createdAt
      updatedAt
    }
    userErrors {
      field
      message
    }
  }
}
