mutation StandardMetafieldDefinitionEnableParityPlan(
  $ownerType: MetafieldOwnerType!
  $namespace: String!
  $key: String!
  $pin: Boolean
) {
  standardMetafieldDefinitionEnable(ownerType: $ownerType, namespace: $namespace, key: $key, pin: $pin) {
    createdDefinition {
      id
      name
      namespace
      key
      ownerType
      pinnedPosition
      type {
        name
      }
    }
    userErrors {
      field
      message
    }
  }
}
