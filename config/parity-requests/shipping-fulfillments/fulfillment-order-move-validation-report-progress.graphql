mutation FulfillmentOrderMoveValidationReportProgress($id: ID!, $progressReport: FulfillmentOrderReportProgressInput) {
  fulfillmentOrderReportProgress(id: $id, progressReport: $progressReport) {
    fulfillmentOrder {
      id
      status
      requestStatus
      assignedLocation {
        name
        location {
          id
          name
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
