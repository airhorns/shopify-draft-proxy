query FulfillmentOrderMergeValidationOrderRead($id: ID!) {
  order(id: $id) {
    id
    name
    displayFulfillmentStatus
    fulfillmentOrders(first: 10) {
      nodes {
        id
        status
        requestStatus
        fulfillBy
        lineItems(first: 5) {
          nodes {
            id
            totalQuantity
            remainingQuantity
            lineItem {
              id
              title
              quantity
              fulfillableQuantity
            }
          }
        }
      }
    }
  }
}
