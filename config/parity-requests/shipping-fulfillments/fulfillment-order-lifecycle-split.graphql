mutation FulfillmentOrderSplitLifecycle($fulfillmentOrderSplits: [FulfillmentOrderSplitInput!]!) {
  fulfillmentOrderSplit(fulfillmentOrderSplits: $fulfillmentOrderSplits) {
    fulfillmentOrderSplits {
      fulfillmentOrder {
        id
        status
        requestStatus
        fulfillAt
        fulfillBy
        updatedAt
        supportedActions {
          action
        }
        assignedLocation {
          name
          location {
            id
            name
          }
        }
        fulfillmentHolds {
          id
          handle
          reason
          reasonNotes
          displayReason
          heldByApp {
            id
            title
          }
          heldByRequestingApp
        }
        lineItems(first: 5) {
          nodes {
            id
            totalQuantity
            remainingQuantity
            lineItem {
              id
              title
              quantity
              fulfillableQuantity
            }
          }
        }
      }
      remainingFulfillmentOrder {
        id
        status
        requestStatus
        fulfillAt
        fulfillBy
        updatedAt
        supportedActions {
          action
        }
        assignedLocation {
          name
          location {
            id
            name
          }
        }
        fulfillmentHolds {
          id
          handle
          reason
          reasonNotes
          displayReason
          heldByApp {
            id
            title
          }
          heldByRequestingApp
        }
        lineItems(first: 5) {
          nodes {
            id
            totalQuantity
            remainingQuantity
            lineItem {
              id
              title
              quantity
              fulfillableQuantity
            }
          }
        }
      }
      replacementFulfillmentOrder {
        id
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
