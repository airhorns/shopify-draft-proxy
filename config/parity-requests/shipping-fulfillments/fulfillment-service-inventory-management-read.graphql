query FulfillmentServiceInventoryManagementRead($id: ID!) {
  fulfillmentService(id: $id) {
    id
    handle
    serviceName
    callbackUrl
    trackingSupport
    inventoryManagement
    requiresShippingMethod
    type
    location {
      id
      name
      isFulfillmentService
      fulfillsOnlineOrders
      shipsInventory
    }
  }
}
