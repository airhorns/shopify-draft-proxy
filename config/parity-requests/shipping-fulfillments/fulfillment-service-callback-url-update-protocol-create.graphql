mutation FulfillmentServiceCallbackUrlUpdateProtocolCreate($name: String!, $callbackUrl: URL!) {
  fulfillmentServiceCreate(
    name: $name
    callbackUrl: $callbackUrl
    trackingSupport: false
    inventoryManagement: false
    requiresShippingMethod: false
  ) {
    fulfillmentService {
      id
      handle
      serviceName
      callbackUrl
      trackingSupport
      inventoryManagement
      requiresShippingMethod
      type
      location {
        id
        name
        isFulfillmentService
        fulfillsOnlineOrders
        shipsInventory
      }
    }
    userErrors {
      field
      message
    }
  }
}
