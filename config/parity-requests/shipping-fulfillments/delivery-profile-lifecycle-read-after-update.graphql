query DeliveryProfileLifecycleReadAfterUpdate($id: ID!) {
  deliveryProfile(id: $id) {
    name
    profileLocationGroups {
      countriesInAnyZone {
        zone
        country {
          code {
            countryCode
            restOfWorld
          }
        }
      }
      locationGroupZones(first: 5) {
        nodes {
          zone {
            name
            countries {
              code {
                countryCode
                restOfWorld
              }
            }
          }
          methodDefinitions(first: 5) {
            nodes {
              name
              active
              description
            }
          }
        }
      }
    }
  }
}
