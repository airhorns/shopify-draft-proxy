mutation DeliveryProfileVariantAssociationCreate($profile: DeliveryProfileInput!) {
  deliveryProfileCreate(profile: $profile) {
    profile {
      id
      name
      productVariantsCount {
        count
        precision
      }
      profileItems(first: 5) {
        nodes {
          product {
            id
            title
          }
          variants(first: 5) {
            nodes {
              id
              title
            }
            pageInfo {
              hasNextPage
              hasPreviousPage
              startCursor
              endCursor
            }
          }
        }
        pageInfo {
          hasNextPage
          hasPreviousPage
          startCursor
          endCursor
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
