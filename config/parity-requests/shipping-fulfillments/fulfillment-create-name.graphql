mutation FulfillmentCreateName($fulfillment: FulfillmentInput!, $message: String) {
  fulfillmentCreate(fulfillment: $fulfillment, message: $message) {
    fulfillment {
      id
      name
      status
      displayStatus
      trackingInfo(first: 5) {
        number
        url
        company
      }
      fulfillmentLineItems(first: 5) {
        nodes {
          id
          quantity
          lineItem {
            id
            title
          }
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
