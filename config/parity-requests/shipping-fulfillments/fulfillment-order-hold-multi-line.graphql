fragment FulfillmentOrderHoldMultiLineFields on FulfillmentOrder {
  id
  status
  requestStatus
  fulfillAt
  fulfillBy
  updatedAt
  supportedActions {
    action
  }
  assignedLocation {
    name
    location {
      id
      name
    }
  }
  fulfillmentHolds {
    id
    handle
    reason
    reasonNotes
    displayReason
    heldByApp {
      id
      title
    }
    heldByRequestingApp
  }
  lineItems(first: 5) {
    nodes {
      id
      totalQuantity
      remainingQuantity
      lineItem {
        id
        title
        quantity
        fulfillableQuantity
      }
    }
  }
}

mutation FulfillmentOrderHoldMultiLine($id: ID!, $fulfillmentHold: FulfillmentOrderHoldInput!) {
  fulfillmentOrderHold(id: $id, fulfillmentHold: $fulfillmentHold) {
    fulfillmentHold {
      id
      handle
      reason
      reasonNotes
      displayReason
      heldByRequestingApp
    }
    fulfillmentOrder {
      ...FulfillmentOrderHoldMultiLineFields
    }
    remainingFulfillmentOrder {
      ...FulfillmentOrderHoldMultiLineFields
    }
    userErrors {
      field
      message
      code
    }
  }
}
