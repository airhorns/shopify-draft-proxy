mutation FulfillmentServiceNameWhitespacePrimary($createName: String!, $setupName: String!) {
  createWhitespace: fulfillmentServiceCreate(
    name: $createName
    trackingSupport: true
    inventoryManagement: true
    requiresShippingMethod: true
  ) {
    fulfillmentService {
      id
      handle
      serviceName
      callbackUrl
      trackingSupport
      inventoryManagement
      requiresShippingMethod
      type
      location {
        id
        name
        isFulfillmentService
        fulfillsOnlineOrders
        shipsInventory
      }
    }
    userErrors {
      field
      message
    }
  }
  setupUpdateSource: fulfillmentServiceCreate(
    name: $setupName
    trackingSupport: true
    inventoryManagement: true
    requiresShippingMethod: true
  ) {
    fulfillmentService {
      id
      handle
      serviceName
      callbackUrl
      trackingSupport
      inventoryManagement
      requiresShippingMethod
      type
      location {
        id
        name
        isFulfillmentService
        fulfillsOnlineOrders
        shipsInventory
      }
    }
    userErrors {
      field
      message
    }
  }
}
