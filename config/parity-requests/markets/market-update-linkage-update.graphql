mutation MarketUpdateLinkageUpdate($id: ID!, $input: MarketUpdateInput!) {
  marketUpdate(id: $id, input: $input) {
    market {
      id
      catalogs(first: 5) {
        nodes {
          id
          ... on MarketCatalog {
            markets(first: 5) {
              nodes {
                id
              }
            }
          }
        }
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
