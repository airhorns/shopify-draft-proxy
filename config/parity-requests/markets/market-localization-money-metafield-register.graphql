mutation MarketLocalizationMoneyMetafieldRegister(
  $resourceId: ID!
  $marketLocalizations: [MarketLocalizationRegisterInput!]!
) {
  marketLocalizationsRegister(resourceId: $resourceId, marketLocalizations: $marketLocalizations) {
    marketLocalizations {
      key
      value
      updatedAt
      outdated
      market {
        id
        name
      }
    }
    userErrors {
      __typename
      field
      message
      code
    }
  }
}
