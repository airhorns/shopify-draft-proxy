query PriceListFixedPricesByProductRead($priceListId: ID!, $priceQuery: String, $originType: PriceListPriceOriginType) {
  priceList(id: $priceListId) {
    id
    name
    currency
    fixedPricesCount
    prices(first: 10, query: $priceQuery, originType: $originType) {
      edges {
        cursor
        node {
          price {
            amount
            currencyCode
          }
          compareAtPrice {
            amount
            currencyCode
          }
          originType
          variant {
            id
            sku
            product {
              id
              title
            }
          }
        }
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
    }
  }
}
