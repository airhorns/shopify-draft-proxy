fragment CatalogsConnectionNextPageFields on Catalog {
  __typename
  id
  title
  status
  ... on MarketCatalog {
    markets(first: 2) {
      nodes {
        id
        name
      }
    }
  }
}

query CatalogsConnectionNextPage($query: String!, $first: Int!, $after: String!) {
  nextPage: catalogs(first: $first, after: $after, type: MARKET, query: $query, sortKey: TITLE, reverse: true) {
    nodes {
      ...CatalogsConnectionNextPageFields
    }
    edges {
      cursor
      node {
        ...CatalogsConnectionNextPageFields
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}
