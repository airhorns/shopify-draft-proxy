query PriceListsRead($first: Int!) {
  priceLists(first: $first) {
    edges {
      cursor
      node {
        __typename
        id
        name
        currency
        fixedPricesCount
        parent {
          adjustment {
            type
            value
          }
        }
        catalog {
          id
          title
          status
        }
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}
