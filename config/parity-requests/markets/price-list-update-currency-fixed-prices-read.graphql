#graphql
query PriceListUpdateCurrencyFixedPricesRead($priceListId: ID!, $catalogId: ID!) {
  priceList(id: $priceListId) {
    id
    name
    currency
    fixedPricesCount
    parent {
      adjustment {
        type
        value
      }
    }
    catalog {
      id
      title
      status
    }
    prices(first: 10, originType: FIXED) {
      edges {
        cursor
        node {
          price {
            amount
            currencyCode
          }
          compareAtPrice {
            amount
            currencyCode
          }
          originType
          variant {
            id
            sku
            product {
              id
              title
            }
          }
        }
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
    }
  }
  catalog(id: $catalogId) {
    id
    title
    status
    ... on MarketCatalog {
      priceList {
        id
        currency
        fixedPricesCount
      }
    }
  }
}
