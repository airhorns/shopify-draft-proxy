#graphql
mutation CatalogContextUpdateCatalogNotFound($catalogId: ID!, $contextsToAdd: CatalogContextInput) {
  catalogContextUpdate(catalogId: $catalogId, contextsToAdd: $contextsToAdd) {
    catalog {
      title
      status
      ... on MarketCatalog {
        markets(first: 5) {
          nodes {
            name
          }
        }
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
