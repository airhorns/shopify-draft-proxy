fragment MarketWebPresencePartialUpdateFields on MarketWebPresence {
  id
  subfolderSuffix
  domain {
    id
    host
    url
    sslEnabled
  }
  rootUrls {
    locale
    url
  }
  defaultLocale {
    locale
    name
    primary
    published
  }
  alternateLocales {
    locale
    name
    primary
    published
  }
  markets(first: 5) {
    nodes {
      id
      name
      handle
      status
      type
    }
  }
}

mutation MarketWebPresencePartialUpdateAlternateLocales($id: ID!, $input: WebPresenceUpdateInput!) {
  webPresenceUpdate(id: $id, input: $input) {
    webPresence {
      ...MarketWebPresencePartialUpdateFields
    }
    userErrors {
      field
      message
      code
    }
  }
}
