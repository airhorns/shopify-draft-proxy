query PriceListsWindowFirstPage($first: Int!) {
  priceLists(first: $first) {
    edges {
      cursor
      node {
        __typename
        id
        name
        currency
        fixedPricesCount
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}
