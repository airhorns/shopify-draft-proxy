#graphql
mutation CatalogContextUpdateCompanyCatalogCreate($input: CatalogCreateInput!) {
  catalogCreate(input: $input) {
    catalog {
      __typename
      id
      title
      status
      ... on CompanyLocationCatalog {
        companyLocations(first: 5) {
          nodes {
            name
          }
        }
      }
    }
    userErrors {
      __typename
      field
      message
      code
    }
  }
}
