#graphql
query MarketPriceInclusionsRead($id: ID!) {
  market(id: $id) {
    id
    name
    handle
    status
    type
    currencySettings {
      baseCurrency {
        currencyCode
        currencyName
      }
      localCurrencies
      roundingEnabled
    }
    priceInclusions {
      inclusiveDutiesPricingStrategy
      inclusiveTaxPricingStrategy
    }
  }
}
