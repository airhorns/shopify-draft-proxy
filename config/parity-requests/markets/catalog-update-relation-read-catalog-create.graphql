mutation CatalogUpdateRelationReadCatalogCreate($input: CatalogCreateInput!) {
  catalogCreate(input: $input) {
    catalog {
      id
      title
      status
      ... on MarketCatalog {
        markets(first: 5) {
          nodes {
            id
            name
          }
        }
      }
      priceList {
        id
      }
      publication {
        id
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
