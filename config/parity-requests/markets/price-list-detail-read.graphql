fragment PriceListReadFields on PriceList {
  __typename
  id
  name
  currency
  fixedPricesCount
  parent {
    adjustment {
      type
      value
    }
  }
  catalog {
    id
    title
    status
  }
  prices(first: 5, query: $priceQuery, originType: $originType) {
    edges {
      cursor
      node {
        price {
          amount
          currencyCode
        }
        compareAtPrice {
          amount
          currencyCode
        }
        originType
        variant {
          id
          sku
          product {
            id
            title
          }
        }
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}

query PriceListDetailRead($priceListId: ID!, $priceQuery: String, $originType: PriceListPriceOriginType) {
  priceList(id: $priceListId) {
    ...PriceListReadFields
  }
}
