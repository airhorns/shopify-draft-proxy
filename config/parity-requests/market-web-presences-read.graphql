fragment MarketWebPresenceReadFields on MarketWebPresence {
  id
  subfolderSuffix
  domain {
    id
    host
    url
    sslEnabled
  }
  rootUrls {
    locale
    url
  }
  markets(first: 5) {
    edges {
      cursor
      node {
        id
        name
        handle
        status
        type
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}

query MarketWebPresencesRead($first: Int!) {
  webPresences(first: $first) {
    edges {
      cursor
      node {
        ...MarketWebPresenceReadFields
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}
