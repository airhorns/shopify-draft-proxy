mutation ProductSetParityPlan($identifier: ProductSetIdentifiers, $input: ProductSetInput!, $synchronous: Boolean!) {
  productSet(identifier: $identifier, input: $input, synchronous: $synchronous) {
    product {
      id
      title
      handle
      status
      vendor
      productType
      tags
      totalInventory
      options {
        id
        name
        position
        values
        optionValues {
          id
          name
          hasVariants
        }
      }
      variants(first: 10) {
        nodes {
          id
          title
          sku
          price
          inventoryQuantity
          selectedOptions {
            name
            value
          }
          inventoryItem {
            id
            tracked
            requiresShipping
            inventoryLevels(first: 10) {
              nodes {
                id
                location {
                  id
                  name
                }
                quantities(names: ["available", "on_hand", "incoming"]) {
                  name
                  quantity
                  updatedAt
                }
              }
            }
          }
        }
      }
      metafields(first: 10) {
        nodes {
          id
          namespace
          key
          type
          value
        }
      }
    }
    productSetOperation {
      id
      status
      userErrors {
        field
        message
      }
    }
    userErrors {
      field
      message
    }
  }
}
