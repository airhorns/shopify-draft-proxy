mutation DraftOrderCreateParityPlan($input: DraftOrderInput!) {
  draftOrderCreate(input: $input) {
    draftOrder {
      id
      name
      status
      email
      tags
      invoiceUrl
      customAttributes {
        key
        value
      }
      billingAddress {
        firstName
        lastName
        address1
        city
        provinceCode
        countryCodeV2
        zip
      }
      shippingAddress {
        firstName
        lastName
        address1
        city
        provinceCode
        countryCodeV2
        zip
      }
      shippingLine {
        title
        code
        originalPriceSet {
          shopMoney {
            amount
            currencyCode
          }
        }
      }
      totalPriceSet {
        shopMoney {
          amount
          currencyCode
        }
      }
      lineItems(first: 5) {
        nodes {
          id
          title
          quantity
          sku
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
