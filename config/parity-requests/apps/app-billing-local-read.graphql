query AppBillingLocalRead {
  currentAppInstallation {
    id
    activeSubscriptions {
      id
    }
    allSubscriptions(first: 5) {
      nodes {
        id
        status
        trialDays
        lineItems {
          id
          usageRecords(first: 5) {
            nodes {
              description
              price {
                amount
                currencyCode
              }
            }
          }
        }
      }
    }
    oneTimePurchases(first: 5) {
      nodes {
        name
        status
        price {
          amount
          currencyCode
        }
      }
    }
  }
}
