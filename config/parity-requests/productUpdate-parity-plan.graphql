mutation ProductUpdateParityPlan($product: ProductUpdateInput!) {
  productUpdate(product: $product) {
    product {
      id
      title
      handle
      status
      vendor
      productType
      tags
      descriptionHtml
      templateSuffix
      seo {
        title
        description
      }
      onlineStorePreviewUrl
    }
    userErrors {
      field
      message
    }
  }
}
