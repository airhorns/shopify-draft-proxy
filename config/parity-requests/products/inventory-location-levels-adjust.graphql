mutation InventoryLocationLevelsAdjust($input: InventoryAdjustQuantitiesInput!) {
  inventoryAdjustQuantities(input: $input) {
    inventoryAdjustmentGroup {
      reason
      changes {
        name
        delta
        quantityAfterChange
        location {
          id
          name
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
