query InventoryConnectionTransfersPage($query: String!, $after: String) {
  inventoryTransfers(first: 1, query: $query, sortKey: NAME, after: $after) {
    nodes {
      id
      name
      status
      totalQuantity
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}
