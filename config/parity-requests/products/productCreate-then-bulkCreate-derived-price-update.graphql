mutation ProductDerivedFieldsPriceUpdate($productId: ID!, $variants: [ProductVariantsBulkInput!]!) {
  productVariantsBulkUpdate(productId: $productId, variants: $variants) {
    product {
      id
      priceRangeV2 {
        minVariantPrice {
          amount
          currencyCode
        }
        maxVariantPrice {
          amount
          currencyCode
        }
      }
      totalVariants
      hasOnlyDefaultVariant
      hasOutOfStockVariants
      tracksInventory
      totalInventory
    }
    productVariants {
      id
      price
    }
    userErrors {
      field
      message
      code
    }
  }
}
