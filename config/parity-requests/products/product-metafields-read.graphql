query ProductMetafieldsRead($id: ID!, $namespace: String!, $key: String!) {
  product(id: $id) {
    id
    title
    primarySpec: metafield(namespace: $namespace, key: $key) {
      id
      namespace
      key
      type
      value
      compareDigest
      jsonValue
      createdAt
      updatedAt
      ownerType
      definition {
        id
        name
      }
    }
    metafields(first: 1) {
      nodes {
        id
        namespace
        key
        type
        value
        compareDigest
        jsonValue
        createdAt
        updatedAt
        ownerType
      }
      edges {
        cursor
        node {
          id
          namespace
          key
          type
          value
          compareDigest
          jsonValue
          createdAt
          updatedAt
          ownerType
        }
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
    }
  }
}
