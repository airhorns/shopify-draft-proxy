query InventoryTransferReadAfterShipmentParity($id: ID!) {
  inventoryTransfer(id: $id) {
    status
    totalQuantity
    lineItems(first: 10) {
      nodes {
        totalQuantity
        shippableQuantity
        shippedQuantity
        processableQuantity
        pickedForShipmentQuantity
      }
    }
  }
}
