query ProductSetDownstreamRead(
  $id: ID!
  $variantOneId: ID!
  $inventoryItemOneId: ID!
  $variantTwoId: ID!
  $inventoryItemTwoId: ID!
) {
  product(id: $id) {
    id
    title
    handle
    status
    vendor
    productType
    tags
    totalInventory
    descriptionHtml
    templateSuffix
    seo {
      title
      description
    }
    onlineStorePreviewUrl
    options {
      id
      name
      position
      values
      optionValues {
        id
        name
        hasVariants
      }
    }
    variants(first: 10) {
      nodes {
        id
        title
        sku
        barcode
        price
        compareAtPrice
        taxable
        inventoryPolicy
        inventoryQuantity
        selectedOptions {
          name
          value
        }
        inventoryItem {
          id
          tracked
          requiresShipping
          measurement {
            weight {
              unit
              value
            }
          }
          countryCodeOfOrigin
          provinceCodeOfOrigin
          harmonizedSystemCode
          inventoryLevels(first: 10) {
            nodes {
              id
              location {
                id
                name
              }
              quantities(names: ["available", "on_hand", "incoming"]) {
                name
                quantity
                updatedAt
              }
            }
          }
        }
      }
    }
    collections(first: 10) {
      nodes {
        id
        title
        handle
      }
    }
    media(first: 10) {
      nodes {
        mediaContentType
        alt
        preview {
          image {
            url
          }
        }
      }
    }
    metafield(namespace: "custom", key: "material") {
      id
      namespace
      key
      type
      value
    }
    metafields(first: 10) {
      nodes {
        id
        namespace
        key
        type
        value
      }
    }
  }
  variantOne: productVariant(id: $variantOneId) {
    id
    inventoryQuantity
    inventoryItem {
      id
      inventoryLevels(first: 10) {
        nodes {
          id
          location {
            id
            name
          }
          quantities(names: ["available", "on_hand", "incoming"]) {
            name
            quantity
            updatedAt
          }
        }
      }
    }
    product {
      id
      totalInventory
    }
  }
  stockOne: inventoryItem(id: $inventoryItemOneId) {
    id
    inventoryLevels(first: 10) {
      nodes {
        id
        location {
          id
          name
        }
        quantities(names: ["available", "on_hand", "incoming"]) {
          name
          quantity
          updatedAt
        }
      }
    }
    variant {
      id
      inventoryQuantity
      product {
        id
        totalInventory
      }
    }
  }
  variantTwo: productVariant(id: $variantTwoId) {
    id
    inventoryQuantity
    inventoryItem {
      id
      inventoryLevels(first: 10) {
        nodes {
          id
          location {
            id
            name
          }
          quantities(names: ["available", "on_hand", "incoming"]) {
            name
            quantity
            updatedAt
          }
        }
      }
    }
    product {
      id
      totalInventory
    }
  }
  stockTwo: inventoryItem(id: $inventoryItemTwoId) {
    id
    inventoryLevels(first: 10) {
      nodes {
        id
        location {
          id
          name
        }
        quantities(names: ["available", "on_hand", "incoming"]) {
          name
          quantity
          updatedAt
        }
      }
    }
    variant {
      id
      inventoryQuantity
      product {
        id
        totalInventory
      }
    }
  }
}
