mutation ProductVariantsBulkUpdateValidationAtomicity($productId: ID!, $variants: [ProductVariantsBulkInput!]!) {
  productVariantsBulkUpdate(productId: $productId, variants: $variants) {
    product {
      id
      totalInventory
      tracksInventory
    }
    productVariants {
      id
    }
    userErrors {
      field
      message
      code
    }
  }
}
