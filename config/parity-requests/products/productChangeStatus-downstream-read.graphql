query ProductChangeStatusDownstreamRead($id: ID!, $query: String!) {
  product(id: $id) {
    id
    status
    updatedAt
  }
  products(first: 10, query: $query) {
    edges {
      cursor
      node {
        id
        status
      }
    }
    nodes {
      id
      status
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
  productsCount(query: $query) {
    count
    precision
  }
}
