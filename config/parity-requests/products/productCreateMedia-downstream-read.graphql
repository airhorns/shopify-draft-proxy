query ProductCreateMediaDownstreamRead($id: ID!) {
  product(id: $id) {
    id
    media(first: 10) {
      nodes {
        id
        alt
        mediaContentType
        status
        preview {
          image {
            url
          }
        }
        ... on MediaImage {
          image {
            url
          }
        }
      }
    }
    images(first: 10) {
      nodes {
        id
        url
        altText
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
    }
    featuredImage {
      id
      url
      altText
    }
    featuredMedia {
      __typename
      ... on MediaImage {
        id
        alt
        mediaContentType
        status
        image {
          id
          url
          altText
          width
          height
        }
        preview {
          image {
            url
            width
            height
          }
        }
      }
    }
  }
}
