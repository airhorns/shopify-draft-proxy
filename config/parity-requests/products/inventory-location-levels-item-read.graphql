query InventoryLocationLevelsItemRead($locationId: ID!, $firstInventoryItemId: ID!) {
  firstItem: inventoryItem(id: $firstInventoryItemId) {
    inventoryLevel(locationId: $locationId) {
      item {
        id
      }
      quantities(names: ["available", "on_hand"]) {
        name
        quantity
      }
    }
  }
}
