mutation InventoryActivateAvailableValidation(
  $inventoryItemId: ID!
  $locationId: ID!
  $available: Int
  $idempotencyKey: String!
) {
  inventoryActivate(inventoryItemId: $inventoryItemId, locationId: $locationId, available: $available)
    @idempotent(key: $idempotencyKey) {
    inventoryLevel {
      id
      isActive
      location {
        id
        name
      }
      item {
        id
      }
    }
    userErrors {
      field
      message
    }
  }
}
