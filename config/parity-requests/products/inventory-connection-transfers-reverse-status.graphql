query InventoryConnectionTransfersReverseStatus($query: String!, $statusQuery: String!) {
  reversePage: inventoryTransfers(first: 1, query: $query, sortKey: CREATED_AT, reverse: true) {
    nodes {
      id
      name
      status
      totalQuantity
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
  statusMatch: inventoryTransfers(first: 5, query: $statusQuery, sortKey: CREATED_AT) {
    nodes {
      id
      name
      status
      totalQuantity
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}
