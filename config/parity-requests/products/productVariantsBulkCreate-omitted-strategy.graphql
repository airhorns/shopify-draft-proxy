mutation ProductVariantsBulkCreateOmittedStrategy(
  $productId: ID!
  $variants: [ProductVariantsBulkInput!]!
) {
  productVariantsBulkCreate(productId: $productId, variants: $variants) {
    product {
      id
      options {
        id
        name
        position
        values
        optionValues {
          id
          name
          hasVariants
        }
      }
      totalInventory
      tracksInventory
      variants(first: 110) {
        nodes {
          id
          title
          sku
          barcode
          price
          inventoryQuantity
          selectedOptions {
            name
            value
          }
          inventoryItem {
            id
            tracked
            requiresShipping
          }
        }
      }
    }
    productVariants {
      id
      title
      sku
      barcode
      price
      inventoryQuantity
      selectedOptions {
        name
        value
      }
      inventoryItem {
        id
        tracked
        requiresShipping
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
