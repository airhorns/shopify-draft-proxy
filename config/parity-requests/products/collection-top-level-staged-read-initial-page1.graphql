query CollectionTopLevelStagedReadInitialPage1(
  $firstCollectionId: ID!
  $firstHandle: String!
  $firstHandleQuery: String!
  $sharedQuery: String!
  $first: Int!
  $limit: Int!
) {
  createdByIdentifierId: collectionByIdentifier(identifier: { id: $firstCollectionId }) {
    id
    title
    handle
  }
  createdByIdentifierHandle: collectionByIdentifier(identifier: { handle: $firstHandle }) {
    id
    title
    handle
  }
  createdByHandleRoot: collectionByHandle(handle: $firstHandle) {
    id
    title
    handle
  }
  firstByHandle: collections(first: 10, query: $firstHandleQuery, sortKey: ID) {
    nodes {
      id
      title
      handle
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
    }
  }
  sharedFirstPage: collections(first: $first, query: $sharedQuery, sortKey: ID) {
    edges {
      cursor
      node {
        id
        title
        handle
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
  sharedCount: collectionsCount(query: $sharedQuery, limit: $limit) {
    count
    precision
  }
}
