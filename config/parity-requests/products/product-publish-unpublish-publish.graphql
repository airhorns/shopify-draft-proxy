mutation ProductPublishUnpublishPublish($input: ProductPublishInput!, $publicationId: ID!) {
  productPublish(input: $input) {
    product {
      id
      publishedAt
      publishedOnCurrentPublication
      publishedOnPublication(publicationId: $publicationId)
      availablePublicationsCount {
        count
        precision
      }
      resourcePublicationsCount {
        count
        precision
      }
      resourcePublicationsV2(first: 10) {
        nodes {
          publication {
            id
          }
          publishable {
            ... on Product {
              id
            }
          }
        }
      }
      publications(first: 10) {
        nodes {
          isPublished
          publishDate
          product {
            id
          }
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
