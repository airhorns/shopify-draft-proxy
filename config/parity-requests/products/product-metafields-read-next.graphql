query ProductMetafieldsReadNext($id: ID!, $after: String!) {
  product(id: $id) {
    metafields(first: 1, after: $after) {
      nodes {
        id
        namespace
        key
        type
        value
        compareDigest
        jsonValue
        createdAt
        updatedAt
        ownerType
      }
      edges {
        cursor
        node {
          id
          namespace
          key
          type
          value
          compareDigest
          jsonValue
          createdAt
          updatedAt
          ownerType
        }
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
    }
  }
}
