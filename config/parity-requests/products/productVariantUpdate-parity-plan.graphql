mutation ProductVariantUpdateParityPlan($input: ProductVariantInput!) {
  productVariantUpdate(input: $input) {
    product {
      id
      totalInventory
      tracksInventory
      variants(first: 10) {
        nodes {
          id
          title
          sku
          barcode
          price
          compareAtPrice
          taxable
          taxCode
          requiresComponents
          showUnitPrice
          unitPriceMeasurement {
            quantityValue
            quantityUnit
            referenceValue
            referenceUnit
          }
          inventoryPolicy
          inventoryQuantity
          selectedOptions {
            name
            value
          }
          inventoryItem {
            id
            tracked
            requiresShipping
            countryCodeOfOrigin
            provinceCodeOfOrigin
            harmonizedSystemCode
            measurement {
              weight {
                value
                unit
              }
            }
          }
        }
      }
    }
    productVariant {
      id
      title
      sku
      barcode
      price
      compareAtPrice
      taxable
      taxCode
      requiresComponents
      showUnitPrice
      unitPriceMeasurement {
        quantityValue
        quantityUnit
        referenceValue
        referenceUnit
      }
      inventoryPolicy
      inventoryQuantity
      selectedOptions {
        name
        value
      }
      inventoryItem {
        id
        tracked
        requiresShipping
        countryCodeOfOrigin
        provinceCodeOfOrigin
        harmonizedSystemCode
        measurement {
          weight {
            value
            unit
          }
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
