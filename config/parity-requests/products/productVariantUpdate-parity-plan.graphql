mutation ProductVariantUpdateParityPlan($input: ProductVariantInput!) {
  productVariantUpdate(input: $input) {
    product {
      id
      totalInventory
      tracksInventory
      variants(first: 10) {
        nodes {
          id
          title
          sku
          barcode
          price
          compareAtPrice
          taxable
          inventoryPolicy
          inventoryQuantity
          inventoryItem {
            id
            tracked
            requiresShipping
          }
        }
      }
    }
    productVariant {
      id
      title
      sku
      barcode
      price
      compareAtPrice
      taxable
      inventoryPolicy
      inventoryQuantity
      selectedOptions {
        name
        value
      }
      inventoryItem {
        id
        tracked
        requiresShipping
      }
    }
    userErrors {
      field
      message
    }
  }
}
