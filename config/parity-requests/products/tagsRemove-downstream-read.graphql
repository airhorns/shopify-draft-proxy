query TagsRemoveDownstreamRead($id: ID!, $remainingQuery: String!, $removedQuery: String!) {
  product(id: $id) {
    id
    tags
  }
  remaining: products(first: 10, query: $remainingQuery) {
    edges {
      cursor
      node {
        id
        tags
      }
    }
    nodes {
      id
      tags
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
  removed: products(first: 10, query: $removedQuery) {
    edges {
      cursor
      node {
        id
        tags
      }
    }
    nodes {
      id
      tags
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
  remainingCount: productsCount(query: $remainingQuery) {
    count
    precision
  }
  removedCount: productsCount(query: $removedQuery) {
    count
    precision
  }
}
