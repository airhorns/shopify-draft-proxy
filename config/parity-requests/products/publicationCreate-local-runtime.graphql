mutation PublicationCreateLocalRuntime($input: PublicationCreateInput!) {
  publicationCreate(input: $input) {
    publication {
      id
      name
      autoPublish
      supportsFuturePublishing
      channel {
        id
        name
        publication {
          id
          name
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
