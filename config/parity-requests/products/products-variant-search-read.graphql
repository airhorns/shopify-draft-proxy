query ProductsVariantSearchRead($query: String!) {
  matches: productsCount(query: $query) {
    count
    precision
  }
  products(first: 5, query: $query) {
    edges {
      node {
        id
        title
        handle
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}
