mutation CollectionSmartRuleSetMembershipProductSet($input: ProductSetInput!, $synchronous: Boolean!) {
  productSet(input: $input, synchronous: $synchronous) {
    product {
      id
      title
      handle
      status
      vendor
      productType
      tags
      variants(first: 10) {
        nodes {
          id
          price
        }
      }
    }
    productSetOperation {
      id
      status
      userErrors {
        field
        message
      }
    }
    userErrors {
      field
      message
    }
  }
}
