query CollectionMembershipProductsWindowFirst($id: ID!, $first: Int!) {
  collection(id: $id) {
    id
    products(first: $first, sortKey: MANUAL) {
      edges {
        cursor
        node {
          id
          title
        }
      }
      nodes {
        id
        title
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
    }
  }
}
