query CollectionsCatalogRead(
  $catalogFirst: Int!
  $first: Int!
  $titleWildcardQuery: String!
  $customTypeQuery: String!
  $smartTypeQuery: String!
  $updatedSortQuery: String!
  $emptyQuery: String!
  $productMembershipQuery: String!
) {
  collections(first: $catalogFirst) {
    edges {
      cursor
      node {
        id
        legacyResourceId
        title
        handle
        updatedAt
        description
        descriptionHtml
        image {
          id
          url
          altText
          width
          height
        }
        productsCount {
          count
          precision
        }
        sortOrder
        templateSuffix
        seo {
          title
          description
        }
        ruleSet {
          appliedDisjunctively
          rules {
            column
            relation
            condition
          }
        }
        products(first: 2) {
          edges {
            cursor
            node {
              id
              title
              handle
              vendor
            }
          }
          pageInfo {
            hasNextPage
            hasPreviousPage
            startCursor
            endCursor
          }
        }
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
  titleWildcard: collections(first: $first, query: $titleWildcardQuery, sortKey: TITLE) {
    edges {
      cursor
      node {
        id
        title
        handle
        updatedAt
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
  customCollections: collections(first: $first, query: $customTypeQuery, sortKey: ID) {
    edges {
      cursor
      node {
        id
        title
        handle
        ruleSet {
          appliedDisjunctively
        }
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
  smartCollections: collections(first: $first, query: $smartTypeQuery, sortKey: TITLE) {
    edges {
      cursor
      node {
        id
        title
        handle
        ruleSet {
          appliedDisjunctively
          rules {
            column
            relation
            condition
          }
        }
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
  updatedNewest: collections(first: $first, query: $updatedSortQuery, sortKey: UPDATED_AT, reverse: true) {
    edges {
      cursor
      node {
        id
        title
        handle
        updatedAt
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
  productMembership: collections(first: $first, query: $productMembershipQuery, sortKey: ID) {
    edges {
      cursor
      node {
        id
        title
        handle
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
  emptyUnmatched: collections(first: $first, query: $emptyQuery) {
    edges {
      cursor
      node {
        id
        title
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}
