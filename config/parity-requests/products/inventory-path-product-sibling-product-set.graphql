mutation InventoryPathProductSiblingProductSet($input: ProductSetInput!, $synchronous: Boolean!) {
  productSet(input: $input, synchronous: $synchronous) {
    product {
      id
      title
      status
      totalInventory
      tracksInventory
      variants(first: 1) {
        nodes {
          id
          inventoryQuantity
          inventoryItem {
            id
            tracked
            requiresShipping
          }
        }
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
