query ProductDerivedFieldsDownstream($id: ID!) {
  product(id: $id) {
    id
    priceRangeV2 {
      minVariantPrice {
        amount
        currencyCode
      }
      maxVariantPrice {
        amount
        currencyCode
      }
    }
    priceRange {
      minVariantPrice {
        amount
        currencyCode
      }
      maxVariantPrice {
        amount
        currencyCode
      }
    }
    totalVariants
    hasOnlyDefaultVariant
    hasOutOfStockVariants
    tracksInventory
    totalInventory
  }
}
