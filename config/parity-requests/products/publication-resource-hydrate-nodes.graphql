query PublicationResourceHydrate($ids: [ID!]!) {
  nodes(ids: $ids) {
    ... on Product {
      id
      title
      handle
      status
      resourcePublications(first: 50) {
        nodes {
          publication {
            id
          }
        }
      }
    }
    ... on Collection {
      id
      title
      handle
      resourcePublications(first: 50) {
        nodes {
          publication {
            id
          }
        }
      }
    }
  }
}
