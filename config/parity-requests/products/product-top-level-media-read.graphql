#graphql
query ProductTopLevelMediaRead($id: ID!) {
  product(id: $id) {
    id
    title
    media(first: 10) {
      nodes {
        __typename
        id
        alt
        mediaContentType
        status
        preview {
          image {
            url
          }
        }
        ... on MediaImage {
          image {
            url
          }
        }
        ... on ExternalVideo {
          originUrl
          embedUrl
        }
      }
    }
  }
}
