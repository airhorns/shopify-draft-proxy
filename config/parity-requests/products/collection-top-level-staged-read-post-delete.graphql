query CollectionTopLevelStagedReadPostDelete($sharedQuery: String!, $deletedHandleQuery: String!) {
  remainingShared: collections(first: 10, query: $sharedQuery, sortKey: ID) {
    nodes {
      id
      title
      handle
    }
  }
  sharedCount: collectionsCount(query: $sharedQuery) {
    count
    precision
  }
  deletedByHandle: collections(first: 10, query: $deletedHandleQuery, sortKey: ID) {
    nodes {
      id
      title
      handle
    }
  }
  deletedCount: collectionsCount(query: $deletedHandleQuery) {
    count
    precision
  }
}
