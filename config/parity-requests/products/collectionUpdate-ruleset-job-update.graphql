mutation CollectionUpdateRuleSetJobUpdate($input: CollectionInput!) {
  collectionUpdate(input: $input) {
    collection {
      id
      title
      handle
      ruleSet {
        appliedDisjunctively
        rules {
          column
          relation
          condition
        }
      }
    }
    job {
      id
      done
    }
    userErrors {
      field
      message
    }
  }
}
