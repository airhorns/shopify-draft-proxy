mutation ProductVariantMediaValidationProductCreateMedia($productId: ID!, $media: [CreateMediaInput!]!) {
  productCreateMedia(productId: $productId, media: $media) {
    media {
      id
      alt
      mediaContentType
      status
    }
    mediaUserErrors {
      field
      message
    }
    product {
      id
      media(first: 10) {
        nodes {
          id
          alt
          mediaContentType
          status
        }
      }
    }
  }
}
