query ProductVariantUpdateDownstreamRead($id: ID!, $query: String!) {
  product(id: $id) {
    id
    totalInventory
    tracksInventory
    variants(first: 10) {
      nodes {
        id
        title
        sku
        barcode
        price
        compareAtPrice
        taxable
        taxCode
        requiresComponents
        showUnitPrice
        unitPriceMeasurement {
          quantityValue
          quantityUnit
          referenceValue
          referenceUnit
        }
        inventoryPolicy
        inventoryQuantity
        selectedOptions {
          name
          value
        }
        inventoryItem {
          id
          tracked
          requiresShipping
          countryCodeOfOrigin
          provinceCodeOfOrigin
          harmonizedSystemCode
          measurement {
            weight {
              value
              unit
            }
          }
        }
      }
    }
  }
  products(first: 10, query: $query) {
    nodes {
      id
      totalInventory
      tracksInventory
    }
  }
  skuCount: productsCount(query: $query) {
    count
    precision
  }
}
