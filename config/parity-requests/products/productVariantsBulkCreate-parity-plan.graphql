mutation ProductVariantsBulkCreateParityPlan($productId: ID!, $variants: [ProductVariantsBulkInput!]!) {
  productVariantsBulkCreate(productId: $productId, variants: $variants) {
    product {
      id
      totalInventory
      tracksInventory
      variants(first: 10) {
        nodes {
          id
          title
          sku
          barcode
          price
          compareAtPrice
          taxable
          taxCode
          position
          requiresComponents
          showUnitPrice
          unitPriceMeasurement {
            quantityValue
            quantityUnit
            referenceValue
            referenceUnit
          }
          inventoryQuantity
          selectedOptions {
            name
            value
          }
          inventoryItem {
            id
            tracked
            requiresShipping
            countryCodeOfOrigin
            provinceCodeOfOrigin
            harmonizedSystemCode
            measurement {
              weight {
                value
                unit
              }
            }
          }
        }
      }
    }
    productVariants {
      id
      title
      sku
      barcode
      price
      compareAtPrice
      taxable
      taxCode
      position
      requiresComponents
      showUnitPrice
      unitPriceMeasurement {
        quantityValue
        quantityUnit
        referenceValue
        referenceUnit
      }
      inventoryQuantity
      selectedOptions {
        name
        value
      }
      inventoryItem {
        id
        tracked
        requiresShipping
        countryCodeOfOrigin
        provinceCodeOfOrigin
        harmonizedSystemCode
        measurement {
          weight {
            value
            unit
          }
        }
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
