query ProductRelatedByIdNotFound(
  $missingCollectionId: ID!
  $missingProductVariantId: ID!
  $missingInventoryItemId: ID!
  $missingInventoryLevelId: ID!
) {
  missingCollection: collection(id: $missingCollectionId) {
    id
    title
    handle
  }
  missingProductVariant: productVariant(id: $missingProductVariantId) {
    id
    title
    sku
    inventoryItem {
      id
    }
    product {
      id
    }
  }
  missingInventoryItem: inventoryItem(id: $missingInventoryItemId) {
    id
    tracked
    requiresShipping
    variant {
      id
    }
  }
  missingInventoryLevel: inventoryLevel(id: $missingInventoryLevelId) {
    id
    location {
      id
      name
    }
    quantities(names: ["available", "on_hand"]) {
      name
      quantity
      updatedAt
    }
  }
}
