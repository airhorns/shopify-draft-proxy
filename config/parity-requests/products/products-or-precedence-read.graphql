query ProductsOrPrecedenceRead($precedenceQuery: String!) {
  precedenceCount: productsCount(query: $precedenceQuery) {
    count
    precision
  }
  precedenceMatches: products(first: 10, query: $precedenceQuery, sortKey: UPDATED_AT, reverse: true) {
    edges {
      cursor
      node {
        id
        title
        handle
        vendor
        productType
        tags
        updatedAt
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}
