query InventoryTransferInventoryReadWithNamesParity($id: ID!) {
  inventoryItem(id: $id) {
    variant {
      inventoryQuantity
    }
    inventoryLevels(first: 50) {
      nodes {
        location {
          id
          name
        }
        quantities(names: ["available", "reserved", "on_hand"]) {
          name
          quantity
        }
      }
    }
  }
}
