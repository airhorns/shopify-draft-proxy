query CollectionIdentifierRead($customCollectionId: ID!, $customCollectionHandle: String!, $productId: ID!) {
  customCollection: collectionByIdentifier(identifier: { id: $customCollectionId }) {
    id
    legacyResourceId
    title
    handle
    updatedAt
    description
    descriptionHtml
    image {
      id
      url
      altText
      width
      height
    }
    productsCount {
      count
      precision
    }
    hasProduct(id: $productId)
    sortOrder
    templateSuffix
    seo {
      title
      description
    }
    ruleSet {
      appliedDisjunctively
      rules {
        column
        relation
        condition
      }
    }
    products(first: 3) {
      edges {
        cursor
        node {
          id
          title
          handle
          vendor
          productType
          tags
          totalInventory
          tracksInventory
        }
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
    }
  }
  customCollectionByHandle: collectionByIdentifier(identifier: { handle: $customCollectionHandle }) {
    id
    legacyResourceId
    title
    handle
    updatedAt
    description
    descriptionHtml
    image {
      id
      url
      altText
      width
      height
    }
    productsCount {
      count
      precision
    }
    hasProduct(id: $productId)
    sortOrder
    templateSuffix
    seo {
      title
      description
    }
    ruleSet {
      appliedDisjunctively
      rules {
        column
        relation
        condition
      }
    }
    products(first: 3) {
      edges {
        cursor
        node {
          id
          title
          handle
          vendor
          productType
          tags
          totalInventory
          tracksInventory
        }
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
    }
  }
  missingCollection: collectionByIdentifier(identifier: { handle: "missing-handle-for-parity" }) {
    id
  }
  customIdCollection: collectionByIdentifier(
    identifier: { customId: { namespace: "custom", key: "external_id", value: "missing" } }
  ) {
    id
  }
}
