#graphql
fragment LocationAddMetafieldFields on Location {
  id
  name
  metafield(namespace: "custom", key: "har1041") {
    id
    namespace
    key
    value
    type
  }
  metafields(first: 5, namespace: "custom") {
    nodes {
      id
      namespace
      key
      value
      type
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
    }
  }
}

query LocationAddMetafieldsRead($id: ID!) {
  location(id: $id) {
    ...LocationAddMetafieldFields
  }
}
