mutation PublishableInputValidationUnpublishCurrent($id: ID!) {
  publishableUnpublishToCurrentChannel(id: $id) {
    publishable {
      ... on Product {
        id
        publishedOnCurrentPublication
        resourcePublicationsCount {
          count
          precision
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
