query StorePropertiesShopBaseline {
  shop {
    id
    name
    myshopifyDomain
    url
    primaryDomain {
      id
      host
      url
      sslEnabled
    }
    contactEmail
    email
    currencyCode
    enabledPresentmentCurrencies
    ianaTimezone
    timezoneAbbreviation
    timezoneOffset
    timezoneOffsetMinutes
    taxesIncluded
    taxShipping
    unitSystem
    weightUnit
    shopAddress {
      id
      address1
      address2
      city
      company
      coordinatesValidated
      country
      countryCodeV2
      formatted
      formattedArea
      latitude
      longitude
      phone
      province
      provinceCode
      zip
    }
    plan {
      partnerDevelopment
      publicDisplayName
      shopifyPlus
    }
    resourceLimits {
      locationLimit
      maxProductOptions
      maxProductVariants
      redirectLimitReached
    }
    features {
      avalaraAvatax
      branding
      bundles {
        eligibleForBundles
        ineligibilityReason
        sellsBundles
      }
      captcha
      cartTransform {
        eligibleOperations {
          expandOperation
          mergeOperation
          updateOperation
        }
      }
      dynamicRemarketing
      eligibleForSubscriptionMigration
      eligibleForSubscriptions
      giftCards
      harmonizedSystemCode
      legacySubscriptionGatewayEnabled
      liveView
      paypalExpressSubscriptionGatewayStatus
      reports
      sellsSubscriptions
      showMetrics
      storefront
      unifiedMarkets
    }
    paymentSettings {
      supportedDigitalWallets
    }
    shopPolicies {
      id
      title
      body
      type
      url
      createdAt
      updatedAt
    }
  }
}
