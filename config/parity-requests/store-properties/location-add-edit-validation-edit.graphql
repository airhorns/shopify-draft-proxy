#graphql
mutation LocationAddEditValidationEdit($id: ID!, $input: LocationEditInput!) {
  locationEdit(id: $id, input: $input) {
    location {
      id
      name
      isActive
      fulfillsOnlineOrders
      address {
        address1
        city
        countryCode
        provinceCode
        zip
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
