mutation MobilePlatformApplicationUpdateAndroid($id: ID!) {
  mobilePlatformApplicationUpdate(
    id: $id
    input: {
      android: {
        applicationId: "com.example.android.new"
        appLinksEnabled: true
        sha256CertFingerprints: ["CC:DD", "EE:FF"]
      }
    }
  ) {
    mobilePlatformApplication {
      __typename
      ... on AndroidApplication {
        id
        applicationId
        appLinksEnabled
        sha256CertFingerprints
      }
    }
    userErrors {
      code
      field
      message
    }
  }
}
