mutation CommentModerationStateApprove($id: ID!) {
  commentApprove(id: $id) {
    comment {
      id
      status
      isPublished
      publishedAt
      article {
        id
        title
        handle
        publishedAt
        author {
          name
        }
        blog {
          id
          title
          handle
          commentPolicy
        }
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
