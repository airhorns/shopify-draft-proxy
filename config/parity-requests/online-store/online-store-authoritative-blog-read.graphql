query OnlineStoreAuthoritativeBlogRead($id: ID!) {
  blog(id: $id) {
    id
    title
    handle
    commentPolicy
    tags
    templateSuffix
    createdAt
    updatedAt
    articlesCount {
      count
      precision
    }
    metafields(first: 250) {
      nodes {
        id
        namespace
        key
        type
        value
        jsonValue
        compareDigest
        ownerType
        createdAt
        updatedAt
      }
    }
  }
}
