query FulfillmentServiceAfterCreate($id: ID!, $locationId: ID!) {
  fulfillmentService(id: $id) {
    id
    handle
    serviceName
    callbackUrl
    trackingSupport
    inventoryManagement
    requiresShippingMethod
    type
    location {
      id
      name
      isFulfillmentService
      fulfillsOnlineOrders
      shipsInventory
    }
  }
  location(id: $locationId) {
    id
    name
    isFulfillmentService
    fulfillsOnlineOrders
    shipsInventory
  }
}
