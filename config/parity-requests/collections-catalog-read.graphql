query CollectionsCatalogRead($first: Int!) {
  collections(first: $first) {
    edges {
      cursor
      node {
        id
        legacyResourceId
        title
        handle
        updatedAt
        description
        descriptionHtml
        image {
          id
          url
          altText
          width
          height
        }
        productsCount {
          count
          precision
        }
        sortOrder
        templateSuffix
        seo {
          title
          description
        }
        ruleSet {
          appliedDisjunctively
          rules {
            column
            relation
            condition
          }
        }
        products(first: 2) {
          edges {
            cursor
            node {
              id
              title
              handle
              vendor
            }
          }
          pageInfo {
            hasNextPage
            hasPreviousPage
            startCursor
            endCursor
          }
        }
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}
