mutation ProductOptionsCreateVariantStrategyCreate(
  $productId: ID!
  $options: [OptionCreateInput!]!
  $variantStrategy: ProductOptionCreateVariantStrategy
) {
  productOptionsCreate(productId: $productId, options: $options, variantStrategy: $variantStrategy) {
    product {
      id
      options {
        id
        name
        position
        values
        optionValues {
          id
          name
          hasVariants
        }
      }
      variants(first: 10) {
        nodes {
          id
          title
          selectedOptions {
            name
            value
          }
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
