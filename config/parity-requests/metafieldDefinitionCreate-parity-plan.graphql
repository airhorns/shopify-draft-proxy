mutation MetafieldDefinitionCreateParityPlan($definition: MetafieldDefinitionInput!) {
  metafieldDefinitionCreate(definition: $definition) {
    createdDefinition {
      id
      name
      namespace
      key
      ownerType
      type {
        name
      }
      validations {
        name
        value
      }
    }
    userErrors {
      field
      message
    }
  }
}
