mutation OrderEditExistingWorkflowSetQuantity($id: ID!, $lineItemId: ID!, $quantity: Int!, $restock: Boolean) {
  orderEditSetQuantity(id: $id, lineItemId: $lineItemId, quantity: $quantity, restock: $restock) {
    calculatedOrder {
      id
      lineItems(first: 10) {
        nodes {
          id
          title
          quantity
          currentQuantity
          sku
          variant {
            id
          }
          originalUnitPriceSet {
            shopMoney {
              amount
              currencyCode
            }
          }
        }
      }
      addedLineItems(first: 10) {
        nodes {
          id
          title
          quantity
          sku
          variant {
            id
          }
        }
      }
    }
    calculatedLineItem {
      title
      quantity
      currentQuantity
      sku
      variant {
        id
      }
      originalUnitPriceSet {
        shopMoney {
          amount
          currencyCode
        }
      }
    }
    orderEditSession {
      id
    }
    userErrors {
      field
      message
    }
  }
}
