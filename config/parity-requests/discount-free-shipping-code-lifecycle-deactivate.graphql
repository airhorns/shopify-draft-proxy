mutation DiscountCodeFreeShippingLifecycleDeactivate($id: ID!) {
  discountCodeDeactivate(id: $id) {
    codeDiscountNode {
      id
      codeDiscount {
        __typename
        ... on DiscountCodeFreeShipping {
          title
          status
        }
      }
    }
    userErrors {
      field
      message
      code
      extraInfo
    }
  }
}
