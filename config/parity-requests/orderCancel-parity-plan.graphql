mutation OrderCancelParityPlan(
  $orderId: ID!
  $notifyCustomer: Boolean
  $reason: OrderCancelReason!
  $refundMethod: OrderCancelRefundMethodInput
  $restock: Boolean!
  $staffNote: String
) {
  orderCancel(
    orderId: $orderId
    notifyCustomer: $notifyCustomer
    reason: $reason
    refundMethod: $refundMethod
    restock: $restock
    staffNote: $staffNote
  ) {
    job {
      id
      done
    }
    orderCancelUserErrors {
      field
      message
      code
    }
    userErrors {
      field
      message
    }
  }
}
