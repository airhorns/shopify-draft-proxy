query CustomerMergeDownstreamParity($one: ID!, $two: ID!, $emailOne: String!, $emailTwo: String!, $jobId: ID!) {
  source: customer(id: $one) {
    id
    firstName
    lastName
    displayName
    email
    note
    tags
    numberOfOrders
    defaultEmailAddress {
      emailAddress
    }
    defaultPhoneNumber {
      phoneNumber
    }
    defaultAddress {
      id
      address1
      city
      provinceCode
      countryCodeV2
      zip
    }
    addressesV2(first: 10) {
      nodes {
        id
        address1
        city
        provinceCode
        countryCodeV2
        zip
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
    }
    metafields(first: 10) {
      nodes {
        id
        namespace
        key
        type
        value
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
    }
    orders(first: 10, sortKey: CREATED_AT, reverse: true) {
      nodes {
        id
        name
        email
        createdAt
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
    }
    lastOrder {
      id
      name
      email
      createdAt
    }
    createdAt
    updatedAt
  }
  result: customer(id: $two) {
    id
    firstName
    lastName
    displayName
    email
    note
    tags
    numberOfOrders
    defaultEmailAddress {
      emailAddress
    }
    defaultPhoneNumber {
      phoneNumber
    }
    defaultAddress {
      id
      address1
      city
      provinceCode
      countryCodeV2
      zip
    }
    addressesV2(first: 10) {
      nodes {
        id
        address1
        city
        provinceCode
        countryCodeV2
        zip
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
    }
    metafields(first: 10) {
      nodes {
        id
        namespace
        key
        type
        value
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
    }
    orders(first: 10, sortKey: CREATED_AT, reverse: true) {
      nodes {
        id
        name
        email
        createdAt
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
    }
    lastOrder {
      id
      name
      email
      createdAt
    }
    createdAt
    updatedAt
  }
  byEmailOne: customerByIdentifier(identifier: { emailAddress: $emailOne }) {
    id
    email
    defaultEmailAddress {
      emailAddress
    }
  }
  byEmailTwo: customerByIdentifier(identifier: { emailAddress: $emailTwo }) {
    id
    email
    defaultEmailAddress {
      emailAddress
    }
  }
  customersCount {
    count
    precision
  }
  mergeStatus: customerMergeJobStatus(jobId: $jobId) {
    jobId
    resultingCustomerId
    status
    customerMergeErrors {
      errorFields
      message
    }
  }
}
