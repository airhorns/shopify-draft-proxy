mutation DraftOrderCreateFromOrderParityPlan($orderId: ID!) {
  draftOrderCreateFromOrder(orderId: $orderId) {
    draftOrder {
      id
      name
      invoiceUrl
      status
      ready
      email
      note
      tags
      subtotalPriceSet {
        shopMoney {
          amount
          currencyCode
        }
      }
      totalPriceSet {
        shopMoney {
          amount
          currencyCode
        }
      }
      lineItems(first: 5) {
        nodes {
          id
          title
          quantity
          sku
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
