mutation FulfillmentConstraintRuleUpdateExisting(
  $id: ID!
  $deliveryMethodTypes: [DeliveryMethodType!]!
) {
  successfulUpdate: fulfillmentConstraintRuleUpdate(id: $id, deliveryMethodTypes: $deliveryMethodTypes) {
    fulfillmentConstraintRule {
      id
      deliveryMethodTypes
      function {
        id
        title
        handle
        apiType
        description
        appKey
        app {
          __typename
          id
          title
          handle
          apiKey
        }
      }
      metafields(first: 100) {
        nodes {
          id
          namespace
          key
          type
          value
          compareDigest
          ownerType
          createdAt
          updatedAt
        }
      }
    }
    userErrors {
      code
      field
      message
    }
  }
}
