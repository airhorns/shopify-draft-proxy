mutation StageOwnedFunctionMetadata(
  $validation: ValidationCreateInput!
  $cartFunctionHandle: String!
  $cartBlockOnFailure: Boolean!
  $ready: Boolean!
) {
  validationCreate(validation: $validation) {
    validation {
      id
      title
      enable
      blockOnFailure
      functionId
      functionHandle
      createdAt
      updatedAt
      shopifyFunction {
        id
        title
        handle
        apiType
        description
        appKey
        app {
          __typename
          id
          title
          handle
          apiKey
        }
      }
    }
    userErrors {
      field
      message
      code
    }
  }
  cartTransformCreate(functionHandle: $cartFunctionHandle, blockOnFailure: $cartBlockOnFailure) {
    cartTransform {
      id
      title
      blockOnFailure
      functionId
      functionHandle
      createdAt
      updatedAt
    }
    userErrors {
      field
      message
      code
    }
  }
  taxAppConfigure(ready: $ready) {
    taxAppConfiguration {
      id
      ready
      state
      updatedAt
    }
    userErrors {
      field
      message
      code
    }
  }
}
