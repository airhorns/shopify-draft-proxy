query ProductsSearchRead($nikeQuery: String!, $inventoryQuery: String!) {
  total: productsCount {
    count
    precision
  }
  nike: products(first: 2, query: $nikeQuery) {
    edges {
      node {
        id
        title
        vendor
        status
        totalInventory
      }
    }
    pageInfo {
      hasNextPage
    }
  }
  lowInventory: products(first: 2, query: $inventoryQuery) {
    edges {
      node {
        id
        title
        vendor
        totalInventory
      }
    }
  }
}
