#graphql
query CashManagementLocationSummaryProbe($locationId: ID!, $startDate: Date!, $endDate: Date!) {
  cashManagementLocationSummary(locationId: $locationId, startDate: $startDate, endDate: $endDate) {
    cashBalanceAtStart {
      amount
      currencyCode
    }
    cashBalanceAtEnd {
      amount
      currencyCode
    }
    netCash {
      amount
      currencyCode
    }
    totalDiscrepancies {
      amount
      currencyCode
    }
    sessionsOpened
    sessionsClosed
  }
}
