mutation MarketingActivityLifecycle(
  $createInput: MarketingActivityCreateExternalInput!
  $remoteId: String!
  $updateInput: MarketingActivityUpdateExternalInput!
) {
  createExternal: marketingActivityCreateExternal(input: $createInput) {
    marketingActivity {
      id
      app {
        id
        title
      }
      adSpend {
        amount
        currencyCode
      }
      marketingEvent {
        scheduledToEndAt
      }
    }
    userErrors {
      field
      message
      code
    }
  }
  updateExternal: marketingActivityUpdateExternal(remoteId: $remoteId, input: $updateInput) {
    marketingActivity {
      id
      title
      app {
        id
        title
      }
      adSpend {
        amount
        currencyCode
      }
      marketingEvent {
        scheduledToEndAt
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
