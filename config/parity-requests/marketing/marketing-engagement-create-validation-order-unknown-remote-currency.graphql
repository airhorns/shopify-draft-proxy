mutation MarketingEngagementCreateValidationOrderUnknownRemoteCurrency(
  $remoteId: String!
  $engagement: MarketingEngagementInput!
) {
  marketingEngagementCreate(remoteId: $remoteId, marketingEngagement: $engagement) {
    marketingEngagement {
      occurredOn
    }
    userErrors {
      field
      message
      code
    }
  }
}
