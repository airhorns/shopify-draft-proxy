mutation MarketingActivityPerAppEngagement {
  engagementCreate: marketingEngagementCreate(
    remoteId: "campaign-1"
    marketingEngagement: { occurredOn: "2026-05-06", adSpend: { amount: "10.00", currencyCode: EUR } }
  ) {
    marketingEngagement {
      occurredOn
    }
    userErrors {
      field
      message
      code
    }
  }
}
