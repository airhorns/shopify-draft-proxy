mutation MarketingEngagementCreateValidationOrderMultipleActivitySelectors(
  $activityId: ID!
  $remoteId: String!
  $engagement: MarketingEngagementInput!
) {
  marketingEngagementCreate(marketingActivityId: $activityId, remoteId: $remoteId, marketingEngagement: $engagement) {
    marketingEngagement {
      occurredOn
    }
    userErrors {
      field
      message
      code
    }
  }
}
