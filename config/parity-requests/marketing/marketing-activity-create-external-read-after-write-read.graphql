query MarketingActivityRead($activityId: ID!, $remoteIds: [String!]) {
  marketingActivity(id: $activityId) {
    title
    adSpend {
      amount
      currencyCode
    }
    marketingEvent {
      scheduledToEndAt
    }
  }
  marketingActivities(first: 10, remoteIds: $remoteIds) {
    nodes {
      title
      adSpend {
        amount
        currencyCode
      }
      marketingEvent {
        scheduledToEndAt
      }
    }
  }
}
