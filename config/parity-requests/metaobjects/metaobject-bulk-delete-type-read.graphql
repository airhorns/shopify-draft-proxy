query MetaobjectBulkDeleteByTypeRead(
  $type: String!
  $firstId: ID!
  $lastId: ID!
  $lastHandleQuery: String!
) {
  first: metaobject(id: $firstId) {
    id
    handle
    type
    displayName
    updatedAt
    fields {
      key
      type
      value
      jsonValue
      definition {
        key
        name
        required
        type {
          name
          category
        }
      }
    }
  }
  last: metaobject(id: $lastId) {
    id
    handle
    type
    displayName
    updatedAt
    fields {
      key
      type
      value
      jsonValue
      definition {
        key
        name
        required
        type {
          name
          category
        }
      }
    }
  }
  catalog: metaobjects(type: $type, first: 10, query: $lastHandleQuery) {
    edges {
      cursor
      node {
        id
        handle
        type
        displayName
        updatedAt
        fields {
          key
          type
          value
          jsonValue
          definition {
            key
            name
            required
            type {
              name
              category
            }
          }
        }
      }
    }
    nodes {
      id
      handle
      type
      displayName
      updatedAt
      fields {
        key
        type
        value
        jsonValue
        definition {
          key
          name
          required
          type {
            name
            category
          }
        }
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
  definition: metaobjectDefinitionByType(type: $type) {
    id
    type
    name
    displayNameKey
    fieldDefinitions {
      key
      name
      required
      type {
        name
        category
      }
    }
    metaobjectsCount
  }
}
