mutation MetaobjectDisplayNameConflictMetafieldDefinitionCreate($definition: MetafieldDefinitionInput!) {
  metafieldDefinitionCreate(definition: $definition) {
    createdDefinition {
      id
      namespace
      key
      type {
        name
      }
      validations {
        name
        value
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
