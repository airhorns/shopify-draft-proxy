mutation MetaobjectOnlineStoreTemplateSuffixUpdate($id: ID!, $metaobject: MetaobjectUpdateInput!) {
  metaobjectUpdate(id: $id, metaobject: $metaobject) {
    metaobject {
      id
      handle
      type
      displayName
      capabilities {
        publishable {
          status
        }
        onlineStore {
          templateSuffix
        }
      }
      fields {
        key
        value
      }
    }
    userErrors {
      field
      message
      code
      elementKey
      elementIndex
    }
  }
}
