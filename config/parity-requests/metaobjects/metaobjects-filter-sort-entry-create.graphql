mutation MetaobjectsFilterSortEntryCreate($metaobject: MetaobjectCreateInput!) {
  metaobjectCreate(metaobject: $metaobject) {
    metaobject {
      id
      handle
      displayName
      updatedAt
    }
    userErrors {
      field
      message
      code
      elementKey
      elementIndex
    }
  }
}
