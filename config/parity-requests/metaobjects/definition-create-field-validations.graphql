mutation MetaobjectDefinitionCreateFieldValidations($definition: MetaobjectDefinitionCreateInput!) {
  metaobjectDefinitionCreate(definition: $definition) {
    metaobjectDefinition {
      id
      type
      displayNameKey
      fieldDefinitions {
        key
      }
    }
    userErrors {
      field
      message
      code
      elementKey
      elementIndex
    }
  }
}
