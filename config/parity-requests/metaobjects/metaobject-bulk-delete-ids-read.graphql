query MetaobjectBulkDeleteByIdsRead($firstId: ID!, $missingId: ID!, $secondId: ID!) {
  first: metaobject(id: $firstId) {
    id
    handle
    type
    displayName
    updatedAt
    fields {
      key
      type
      value
      jsonValue
      definition {
        key
        name
        required
        type {
          name
          category
        }
      }
    }
  }
  missing: metaobject(id: $missingId) {
    id
    handle
    type
    displayName
    updatedAt
  }
  second: metaobject(id: $secondId) {
    id
    handle
    type
    displayName
    updatedAt
    fields {
      key
      type
      value
      jsonValue
      definition {
        key
        name
        required
        type {
          name
          category
        }
      }
    }
  }
}
