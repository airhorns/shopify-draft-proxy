mutation MetaobjectBulkDeleteByIdsDefinitionCreate($definition: MetaobjectDefinitionCreateInput!) {
  metaobjectDefinitionCreate(definition: $definition) {
    metaobjectDefinition {
      id
      type
      name
      displayNameKey
      fieldDefinitions {
        key
        name
        required
        type {
          name
          category
        }
      }
      metaobjectsCount
    }
    userErrors {
      field
      message
      code
      elementKey
      elementIndex
    }
  }
}
