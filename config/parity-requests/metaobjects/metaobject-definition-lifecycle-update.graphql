mutation MetaobjectDefinitionLifecycleUpdate($id: ID!, $definition: MetaobjectDefinitionUpdateInput!) {
  metaobjectDefinitionUpdate(id: $id, definition: $definition, resetFieldOrder: true) {
    metaobjectDefinition {
      id
      type
      name
      description
      displayNameKey
      access {
        admin
        storefront
      }
      capabilities {
        publishable {
          enabled
        }
        translatable {
          enabled
        }
        renderable {
          enabled
        }
        onlineStore {
          enabled
        }
      }
      fieldDefinitions {
        key
        name
        description
        required
        type {
          name
          category
        }
        validations {
          name
          value
        }
      }
      metaobjectsCount
      standardTemplate {
        type
        name
      }
    }
    userErrors {
      field
      message
      code
      elementKey
      elementIndex
    }
  }
}
