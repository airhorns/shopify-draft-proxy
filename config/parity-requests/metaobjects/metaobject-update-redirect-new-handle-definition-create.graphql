mutation MetaobjectUpdateRedirectNewHandleDefinitionCreate($definition: MetaobjectDefinitionCreateInput!) {
  metaobjectDefinitionCreate(definition: $definition) {
    metaobjectDefinition {
      id
      type
      displayNameKey
      capabilities {
        publishable {
          enabled
        }
        renderable {
          enabled
        }
        onlineStore {
          enabled
        }
      }
    }
    userErrors {
      field
      message
      code
      elementKey
      elementIndex
    }
  }
}
