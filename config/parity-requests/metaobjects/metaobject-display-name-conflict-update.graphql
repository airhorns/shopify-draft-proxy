mutation MetaobjectDisplayNameConflictUpdate($id: ID!, $metaobject: MetaobjectUpdateInput!) {
  metaobjectUpdate(id: $id, metaobject: $metaobject) {
    metaobject {
      id
      handle
      displayName
    }
    userErrors {
      field
      message
      code
      elementKey
      elementIndex
    }
  }
}
