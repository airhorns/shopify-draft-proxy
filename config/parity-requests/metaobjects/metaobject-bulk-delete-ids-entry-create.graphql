mutation MetaobjectBulkDeleteByIdsEntryCreate($metaobject: MetaobjectCreateInput!) {
  metaobjectCreate(metaobject: $metaobject) {
    metaobject {
      id
      handle
      type
      displayName
      fields {
        key
        type
        value
        jsonValue
        definition {
          key
          name
          required
          type {
            name
            category
          }
        }
      }
    }
    userErrors {
      field
      message
      code
      elementKey
      elementIndex
    }
  }
}
