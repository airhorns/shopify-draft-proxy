mutation MetaobjectOnlineStoreTemplateSuffixUpsert(
  $handle: MetaobjectHandleInput!
  $metaobject: MetaobjectUpsertInput!
) {
  metaobjectUpsert(handle: $handle, metaobject: $metaobject) {
    metaobject {
      id
      handle
      type
      displayName
      capabilities {
        publishable {
          status
        }
        onlineStore {
          templateSuffix
        }
      }
      fields {
        key
        value
      }
    }
    userErrors {
      field
      message
      code
      elementKey
      elementIndex
    }
  }
}
