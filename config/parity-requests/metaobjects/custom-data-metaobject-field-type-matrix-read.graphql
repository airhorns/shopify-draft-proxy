query CustomDataMetaobjectFieldTypeMatrixRead($id: ID!, $handle: MetaobjectHandleInput!, $type: String!) {
  detail: metaobject(id: $id) {
    id
    handle
    type
    displayName
    updatedAt
    fields {
      key
      type
      value
      jsonValue
      definition {
        key
        name
        required
        type {
          name
          category
        }
      }
    }
  }
  byHandle: metaobjectByHandle(handle: $handle) {
    id
    handle
    type
    displayName
    updatedAt
    fields {
      key
      type
      value
      jsonValue
      definition {
        key
        name
        required
        type {
          name
          category
        }
      }
    }
  }
  catalog: metaobjects(type: $type, first: 10) {
    nodes {
      id
      handle
      type
      displayName
      updatedAt
      fields {
        key
        type
        value
        jsonValue
        definition {
          key
          name
          required
          type {
            name
            category
          }
        }
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}
