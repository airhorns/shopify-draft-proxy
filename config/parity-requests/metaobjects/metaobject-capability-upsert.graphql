mutation MetaobjectCapabilityUpsert($handle: MetaobjectHandleInput!, $metaobject: MetaobjectUpsertInput!) {
  metaobjectUpsert(handle: $handle, metaobject: $metaobject) {
    metaobject {
      id
    }
    userErrors {
      field
      message
      code
      elementKey
      elementIndex
    }
  }
}
