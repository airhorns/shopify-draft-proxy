mutation MetaobjectNameIndependenceDefinitionCreate($definition: MetaobjectDefinitionCreateInput!) {
  metaobjectDefinitionCreate(definition: $definition) {
    metaobjectDefinition {
      id
      type
      name
      displayNameKey
      metaobjectsCount
      fieldDefinitions {
        key
        name
        required
        type {
          name
          category
        }
      }
      capabilities {
        publishable {
          enabled
        }
      }
    }
    userErrors {
      field
      message
      code
      elementKey
      elementIndex
    }
  }
}
