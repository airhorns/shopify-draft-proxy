mutation InventoryActivateParityPlan($inventoryItemId: ID!, $locationId: ID!) {
  inventoryActivate(inventoryItemId: $inventoryItemId, locationId: $locationId) {
    inventoryLevel {
      id
      location {
        id
        name
      }
      quantities(names: ["available", "on_hand", "incoming"]) {
        name
        quantity
        updatedAt
      }
      item {
        id
        tracked
        variant {
          id
          inventoryQuantity
          product {
            id
            totalInventory
            tracksInventory
          }
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
