query CustomerTaxExemptionsDownstream($id: ID!, $identifier: CustomerIdentifierInput!, $query: String!, $first: Int!) {
  customer(id: $id) {
    id
    firstName
    lastName
    displayName
    email
    taxExempt
    taxExemptions
    tags
    defaultEmailAddress {
      emailAddress
    }
    createdAt
    updatedAt
  }
  customerByIdentifier(identifier: $identifier) {
    id
    firstName
    lastName
    displayName
    email
    taxExempt
    taxExemptions
    tags
    defaultEmailAddress {
      emailAddress
    }
    createdAt
    updatedAt
  }
  customers(first: $first, query: $query, sortKey: UPDATED_AT, reverse: true) {
    nodes {
      id
      firstName
      lastName
      displayName
      email
      taxExempt
      taxExemptions
      tags
      defaultEmailAddress {
        emailAddress
      }
      createdAt
      updatedAt
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
    }
  }
  customersCount {
    count
    precision
  }
}
