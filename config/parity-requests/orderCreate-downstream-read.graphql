query OrderCreateDownstreamRead($id: ID!) {
  order(id: $id) {
    id
    name
    email
    note
    tags
    customAttributes {
      key
      value
    }
    billingAddress {
      firstName
      lastName
      address1
      city
      provinceCode
      countryCodeV2
      zip
    }
    shippingAddress {
      firstName
      lastName
      address1
      city
      provinceCode
      countryCodeV2
      zip
    }
    displayFinancialStatus
    displayFulfillmentStatus
    currentTotalPriceSet {
      shopMoney {
        amount
        currencyCode
      }
    }
    totalTaxSet {
      shopMoney {
        amount
        currencyCode
      }
    }
    totalDiscountsSet {
      shopMoney {
        amount
        currencyCode
      }
    }
    discountCodes
    lineItems(first: 5) {
      nodes {
        title
        quantity
        sku
        variant {
          id
        }
        taxLines {
          title
          rate
          priceSet {
            shopMoney {
              amount
              currencyCode
            }
          }
        }
      }
    }
  }
}
