mutation OrderCreateParityPlan($order: OrderCreateOrderInput!, $options: OrderCreateOptionsInput) {
  orderCreate(order: $order, options: $options) {
    order {
      id
      name
      email
      createdAt
      updatedAt
      displayFinancialStatus
      displayFulfillmentStatus
      canMarkAsPaid
      paymentGatewayNames
      note
      tags
      customAttributes {
        key
        value
      }
      billingAddress {
        firstName
        lastName
        address1
        city
        provinceCode
        countryCodeV2
        zip
        phone
      }
      shippingAddress {
        firstName
        lastName
        address1
        city
        provinceCode
        countryCodeV2
        zip
        phone
      }
      subtotalPriceSet {
        shopMoney {
          amount
          currencyCode
        }
        presentmentMoney {
          amount
          currencyCode
        }
      }
      currentTotalPriceSet {
        shopMoney {
          amount
          currencyCode
        }
      }
      totalPriceSet {
        shopMoney {
          amount
          currencyCode
        }
      }
      totalTaxSet {
        shopMoney {
          amount
          currencyCode
        }
      }
      totalDiscountsSet {
        shopMoney {
          amount
          currencyCode
        }
      }
      discountCodes
      discountApplications(first: 5) {
        nodes {
          code
          value {
            ... on MoneyV2 {
              amount
              currencyCode
            }
            ... on PricingPercentageValue {
              percentage
            }
          }
        }
      }
      customer {
        id
        email
        displayName
      }
      shippingLines(first: 5) {
        nodes {
          title
          code
          source
          originalPriceSet {
            shopMoney {
              amount
              currencyCode
            }
          }
          taxLines {
            title
            rate
            priceSet {
              shopMoney {
                amount
                currencyCode
              }
            }
          }
        }
      }
      lineItems(first: 5) {
        nodes {
          id
          title
          quantity
          sku
          variantTitle
          variant {
            id
          }
          originalUnitPriceSet {
            shopMoney {
              amount
              currencyCode
            }
            presentmentMoney {
              amount
              currencyCode
            }
          }
          taxLines {
            title
            rate
            priceSet {
              shopMoney {
                amount
                currencyCode
              }
            }
          }
        }
      }
      transactions {
        kind
        status
        gateway
        amountSet {
          shopMoney {
            amount
            currencyCode
          }
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
