mutation OrderCreateParityPlan($order: OrderCreateOrderInput!, $options: OrderCreateOptionsInput) {
  orderCreate(order: $order, options: $options) {
    order {
      id
      name
      email
      displayFinancialStatus
      displayFulfillmentStatus
      note
      tags
      customAttributes {
        key
        value
      }
      billingAddress {
        firstName
        lastName
        address1
        city
        provinceCode
        countryCodeV2
        zip
      }
      shippingAddress {
        firstName
        lastName
        address1
        city
        provinceCode
        countryCodeV2
        zip
      }
      currentTotalPriceSet {
        shopMoney {
          amount
          currencyCode
        }
      }
      totalTaxSet {
        shopMoney {
          amount
          currencyCode
        }
      }
      totalDiscountsSet {
        shopMoney {
          amount
          currencyCode
        }
      }
      discountCodes
      shippingLines(first: 5) {
        nodes {
          title
          code
          source
          originalPriceSet {
            shopMoney {
              amount
              currencyCode
            }
          }
          taxLines {
            title
            rate
            priceSet {
              shopMoney {
                amount
                currencyCode
              }
            }
          }
        }
      }
      lineItems(first: 5) {
        nodes {
          id
          title
          quantity
          sku
          variantTitle
          variant {
            id
          }
          originalUnitPriceSet {
            shopMoney {
              amount
              currencyCode
            }
            presentmentMoney {
              amount
              currencyCode
            }
          }
          taxLines {
            title
            rate
            priceSet {
              shopMoney {
                amount
                currencyCode
              }
            }
          }
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
