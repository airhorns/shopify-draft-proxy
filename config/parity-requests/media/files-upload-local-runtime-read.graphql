query FilesUploadLocalRuntimeRead {
  files(first: 2, reverse: true, sortKey: ID) {
    nodes {
      id
      alt
      createdAt
      fileStatus
      ... on MediaImage {
        image {
          url
          width
          height
        }
        preview {
          image {
            url
          }
        }
      }
    }
    edges {
      cursor
      node {
        id
        alt
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
  fileSavedSearches(first: 5) {
    nodes {
      id
      name
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}
