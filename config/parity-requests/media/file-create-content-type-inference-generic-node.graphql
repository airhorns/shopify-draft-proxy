query MediaFileCreateContentTypeInferenceGenericNode($id: ID!) {
  node(id: $id) {
    __typename
    id
    ... on GenericFile {
      alt
      createdAt
      updatedAt
      fileStatus
      mimeType
      url
    }
    ... on MediaImage {
      image {
        url
      }
    }
    ... on Video {
      mediaContentType
      status
      preview {
        image {
          url
        }
      }
    }
  }
}
