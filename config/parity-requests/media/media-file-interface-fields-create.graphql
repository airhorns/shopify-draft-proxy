mutation MediaFileInterfaceFieldsCreate($files: [FileCreateInput!]!) {
  fileCreate(files: $files) {
    files {
      __typename
      id
      alt
      createdAt
      updatedAt
      fileStatus
      fileErrors {
        code
        message
        details
      }
      ... on MediaImage {
        mimeType
        image {
          url
        }
        mediaErrors {
          code
          message
          details
        }
        mediaWarnings {
          code
          message
        }
      }
      ... on GenericFile {
        mimeType
        url
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
