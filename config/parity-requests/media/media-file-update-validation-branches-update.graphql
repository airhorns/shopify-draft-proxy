mutation MediaFileUpdateValidationBranches($files: [FileUpdateInput!]!) {
  fileUpdate(files: $files) {
    files {
      id
      __typename
      alt
      createdAt
      fileStatus
      ... on MediaImage {
        image {
          url
          width
          height
        }
        preview {
          image {
            url
            width
            height
          }
        }
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
