mutation MediaFileCreateContentTypeInference($files: [FileCreateInput!]!) {
  fileCreate(files: $files) {
    files {
      __typename
      id
      alt
      createdAt
      updatedAt
      fileStatus
      ... on MediaImage {
        mimeType
        image {
          url
          width
          height
        }
        preview {
          image {
            url
          }
        }
      }
      ... on Video {
        mediaContentType
        status
        preview {
          image {
            url
          }
        }
      }
      ... on GenericFile {
        mimeType
        url
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
