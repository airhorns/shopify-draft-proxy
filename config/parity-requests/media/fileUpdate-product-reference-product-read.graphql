query FileReferenceProductRead($productId: ID!) {
  product(id: $productId) {
    id
    title
    media(first: 10) {
      nodes {
        id
        alt
        mediaContentType
        status
        preview {
          image {
            url
          }
        }
        ... on MediaImage {
          image {
            url
          }
        }
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
    }
  }
}
