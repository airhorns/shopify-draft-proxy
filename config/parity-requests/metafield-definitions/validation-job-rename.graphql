mutation MetafieldDefinitionValidationJobRename($definition: MetafieldDefinitionUpdateInput!) {
  metafieldDefinitionUpdate(definition: $definition) {
    updatedDefinition {
      id
      name
      namespace
      key
      ownerType
      validations {
        name
        value
      }
      validationStatus
    }
    validationJob {
      __typename
      id
      done
      query {
        __typename
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
