mutation MetafieldDefinitionUpdatePin($namespace: String!, $categoryId: String!) {
  createPinTarget: metafieldDefinitionCreate(
    definition: {
      ownerType: PRODUCT
      namespace: $namespace
      key: "pin_true"
      name: "Update pin target"
      type: "single_line_text_field"
    }
  ) {
    createdDefinition {
      key
      pinnedPosition
    }
    userErrors {
      field
      message
      code
    }
  }
  createUnpinTarget: metafieldDefinitionCreate(
    definition: {
      ownerType: PRODUCT
      namespace: $namespace
      key: "pin_false"
      name: "Update unpin target"
      type: "single_line_text_field"
      pin: true
    }
  ) {
    createdDefinition {
      key
      pinnedPosition
    }
    userErrors {
      field
      message
      code
    }
  }
  updatePinFalse: metafieldDefinitionUpdate(
    definition: { ownerType: PRODUCT, namespace: $namespace, key: "pin_false", pin: false }
  ) {
    updatedDefinition {
      id
      key
      pinnedPosition
    }
    userErrors {
      field
      message
      code
    }
  }
  updatePinTrue: metafieldDefinitionUpdate(
    definition: { ownerType: PRODUCT, namespace: $namespace, key: "pin_true", pin: true }
  ) {
    updatedDefinition {
      id
      key
      pinnedPosition
    }
    userErrors {
      field
      message
      code
    }
  }
  createConstrained: metafieldDefinitionCreate(
    definition: {
      ownerType: PRODUCT
      namespace: $namespace
      key: "constrained"
      name: "Update constrained pin target"
      type: "single_line_text_field"
      constraints: { key: "category", values: [$categoryId] }
    }
  ) {
    createdDefinition {
      key
      pinnedPosition
      constraints {
        key
      }
    }
    userErrors {
      field
      message
      code
    }
  }
  updateConstrainedPin: metafieldDefinitionUpdate(
    definition: { ownerType: PRODUCT, namespace: $namespace, key: "constrained", pin: true }
  ) {
    updatedDefinition {
      id
      key
      pinnedPosition
    }
    userErrors {
      field
      message
      code
    }
  }
  createOverCap: metafieldDefinitionCreate(
    definition: {
      ownerType: PRODUCT
      namespace: $namespace
      key: "over_cap"
      name: "Update pin over cap target"
      type: "single_line_text_field"
    }
  ) {
    createdDefinition {
      key
      pinnedPosition
    }
    userErrors {
      field
      message
      code
    }
  }
  updateOverCapPin: metafieldDefinitionUpdate(
    definition: { ownerType: PRODUCT, namespace: $namespace, key: "over_cap", pin: true }
  ) {
    updatedDefinition {
      id
      key
      pinnedPosition
    }
    userErrors {
      field
      message
      code
    }
  }
}
