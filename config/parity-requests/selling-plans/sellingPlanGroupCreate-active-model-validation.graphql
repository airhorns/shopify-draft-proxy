mutation SellingPlanGroupCreateActiveModelValidation($input: SellingPlanGroupInput!) {
  sellingPlanGroupCreate(input: $input) {
    sellingPlanGroup {
      id
      sellingPlans(first: 5) {
        nodes {
          id
        }
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
