mutation OrderPaymentCreate($order: OrderCreateOrderInput!) {
  orderCreate(order: $order) {
    order {
      id
      displayFinancialStatus
      capturable
      totalCapturable
      totalCapturableSet {
        shopMoney {
          amount
          currencyCode
        }
      }
      totalOutstandingSet {
        shopMoney {
          amount
          currencyCode
        }
      }
      totalReceivedSet {
        shopMoney {
          amount
          currencyCode
        }
      }
      netPaymentSet {
        shopMoney {
          amount
          currencyCode
        }
      }
      paymentGatewayNames
      transactions {
        id
        kind
        status
        gateway
        paymentId
        paymentReferenceId
        parentTransaction {
          id
          kind
          status
        }
        amountSet {
          shopMoney {
            amount
            currencyCode
          }
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
