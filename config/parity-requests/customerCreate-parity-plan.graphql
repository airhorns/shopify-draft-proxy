mutation CustomerCreateParityPlan($input: CustomerInput!) {
  customerCreate(input: $input) {
    customer {
      id
      firstName
      lastName
      displayName
      email
      locale
      note
      verifiedEmail
      taxExempt
      tags
      state
      canDelete
      defaultEmailAddress {
        emailAddress
      }
      defaultPhoneNumber {
        phoneNumber
      }
      defaultAddress {
        address1
        city
        province
        country
        zip
        formattedArea
      }
      createdAt
      updatedAt
    }
    userErrors {
      field
      message
    }
  }
}
