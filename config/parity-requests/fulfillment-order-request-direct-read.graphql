query FulfillmentOrderRequestDirectRead($id: ID!) {
  fulfillmentOrder(id: $id) {
    id
    status
    requestStatus
    merchantRequests(first: 10) {
      nodes {
        kind
        message
        requestOptions
        responseData
      }
    }
    lineItems(first: 5) {
      nodes {
        totalQuantity
        remainingQuantity
        lineItem {
          id
          title
        }
      }
    }
  }
}
