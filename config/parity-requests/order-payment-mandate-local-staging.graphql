mutation OrderPaymentMandate($id: ID!, $idempotencyKey: String, $amount: MoneyInput) {
  orderCreateMandatePayment(id: $id, idempotencyKey: $idempotencyKey, amount: $amount) {
    job {
      id
      done
    }
    paymentReferenceId
    order {
      id
      displayFinancialStatus
      capturable
      totalCapturable
      totalOutstandingSet {
        shopMoney {
          amount
          currencyCode
        }
      }
      totalReceivedSet {
        shopMoney {
          amount
          currencyCode
        }
      }
      netPaymentSet {
        shopMoney {
          amount
          currencyCode
        }
      }
      paymentGatewayNames
      transactions {
        id
        kind
        status
        gateway
        paymentReferenceId
        amountSet {
          shopMoney {
            amount
            currencyCode
          }
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
