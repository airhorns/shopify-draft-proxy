mutation CustomerUpdateParityPlan($input: CustomerInput!) {
  customerUpdate(input: $input) {
    customer {
      id
      firstName
      lastName
      displayName
      email
      locale
      note
      verifiedEmail
      taxExempt
      taxExemptions
      tags
      state
      canDelete
      loyalty: metafield(namespace: "custom", key: "loyalty") {
        id
        namespace
        key
        type
        value
      }
      metafields(first: 5) {
        nodes {
          id
          namespace
          key
          type
          value
        }
        pageInfo {
          hasNextPage
          hasPreviousPage
          startCursor
          endCursor
        }
      }
      defaultEmailAddress {
        emailAddress
      }
      defaultPhoneNumber {
        phoneNumber
      }
      defaultAddress {
        address1
        city
        province
        country
        zip
        formattedArea
      }
      createdAt
      updatedAt
    }
    userErrors {
      field
      message
    }
  }
}
