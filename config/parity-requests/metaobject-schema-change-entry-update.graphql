fragment MetaobjectSchemaChangeEntryFields on Metaobject {
  id
  handle
  type
  displayName
  updatedAt
  capabilities {
    publishable {
      status
    }
    onlineStore {
      templateSuffix
    }
  }
  fields {
    key
    type
    value
    jsonValue
    definition {
      key
      name
      required
      type {
        name
        category
      }
    }
  }
  summaryField: field(key: "summary") {
    key
    type
    value
    jsonValue
    definition {
      key
      name
      required
      type {
        name
        category
      }
    }
  }
}

mutation MetaobjectSchemaChangeEntryUpdate($id: ID!, $metaobject: MetaobjectUpdateInput!) {
  metaobjectUpdate(id: $id, metaobject: $metaobject) {
    metaobject {
      ...MetaobjectSchemaChangeEntryFields
    }
    userErrors {
      field
      message
      code
      elementKey
      elementIndex
    }
  }
}
