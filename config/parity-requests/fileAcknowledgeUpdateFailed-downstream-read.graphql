query FileAcknowledgeUpdateFailedDownstreamRead {
  files(first: 10) {
    nodes {
      id
      alt
      createdAt
      fileStatus
      filename
      ... on MediaImage {
        image {
          url
          width
          height
        }
      }
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
}
