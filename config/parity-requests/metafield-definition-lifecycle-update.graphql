mutation MetafieldDefinitionLifecycleUpdate($definition: MetafieldDefinitionUpdateInput!) {
  metafieldDefinitionUpdate(definition: $definition) {
    updatedDefinition {
      id
      name
      namespace
      key
      ownerType
      type {
        name
        category
      }
      description
      validations {
        name
        value
      }
      pinnedPosition
      validationStatus
    }
    userErrors {
      field
      message
      code
    }
    validationJob {
      id
    }
  }
}
