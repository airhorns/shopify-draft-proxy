query DraftOrderCreateDownstreamRead($id: ID!) {
  draftOrder(id: $id) {
    status
    email
    tags
    customAttributes {
      key
      value
    }
    billingAddress {
      firstName
      lastName
      address1
      city
      provinceCode
      countryCodeV2
      zip
    }
    shippingAddress {
      firstName
      lastName
      address1
      city
      provinceCode
      countryCodeV2
      zip
    }
    shippingLine {
      title
      code
      originalPriceSet {
        shopMoney {
          amount
          currencyCode
        }
      }
    }
    totalPriceSet {
      shopMoney {
        amount
        currencyCode
      }
    }
    lineItems(first: 5) {
      nodes {
        title
        quantity
        sku
      }
    }
  }
}
