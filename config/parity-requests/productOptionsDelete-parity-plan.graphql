mutation ProductOptionsDeleteParityPlan($productId: ID!, $options: [ID!]!) {
  productOptionsDelete(productId: $productId, options: $options) {
    deletedOptionsIds
    product {
      id
      options {
        id
        name
        position
        values
        optionValues {
          id
          name
          hasVariants
        }
      }
      variants(first: 10) {
        nodes {
          id
          title
          selectedOptions {
            name
            value
          }
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
