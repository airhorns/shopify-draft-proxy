mutation CustomerInputInlineConsentCreate($input: CustomerInput!) {
  customerCreate(input: $input) {
    customer {
      id
      email
      defaultEmailAddress {
        emailAddress
        marketingState
        marketingOptInLevel
        marketingUpdatedAt
      }
      defaultPhoneNumber {
        phoneNumber
        marketingState
        marketingOptInLevel
        marketingUpdatedAt
        marketingCollectedFrom
      }
      emailMarketingConsent {
        marketingState
        marketingOptInLevel
        consentUpdatedAt
      }
      smsMarketingConsent {
        marketingState
        marketingOptInLevel
        consentUpdatedAt
        consentCollectedFrom
      }
    }
    userErrors {
      field
      message
    }
  }
}
