mutation CustomersKeyedSearchCreate($input: CustomerInput!) {
  customerCreate(input: $input) {
    customer {
      id
      email
      firstName
      lastName
      displayName
      state
      tags
      defaultAddress {
        address1
        city
        province
        provinceCode
        country
        countryCodeV2
        zip
        formattedArea
      }
    }
    userErrors {
      field
      message
    }
  }
}
