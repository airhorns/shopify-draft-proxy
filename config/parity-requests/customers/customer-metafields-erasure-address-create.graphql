mutation CustomerMetafieldsErasureAddressCreate($input: CustomerInput!) {
  customerCreate(input: $input) {
    customer {
      id
      email
      defaultAddress {
        city
        country
        countryCodeV2
        province
        provinceCode
        formattedArea
      }
      tier: metafield(namespace: "custom", key: "tier") {
        namespace
        key
        type
        value
      }
      birthday: metafield(namespace: "profile", key: "birthday") {
        namespace
        key
        type
        value
      }
      metafields(first: 5) {
        nodes {
          namespace
          key
          type
          value
        }
        pageInfo {
          hasNextPage
          hasPreviousPage
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
