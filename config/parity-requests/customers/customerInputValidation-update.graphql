mutation CustomerInputValidationUpdate($input: CustomerInput!) {
  customerUpdate(input: $input) {
    customer {
      id
      firstName
      lastName
      displayName
      email
      locale
      note
      verifiedEmail
      taxExempt
      tags
      state
      canDelete
      defaultEmailAddress {
        emailAddress
      }
      defaultPhoneNumber {
        phoneNumber
      }
      createdAt
      updatedAt
    }
    userErrors {
      field
      message
    }
  }
}
