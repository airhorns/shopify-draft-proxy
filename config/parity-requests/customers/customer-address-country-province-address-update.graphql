mutation CustomerAddressCountryProvinceAddressUpdate(
  $customerId: ID!
  $addressId: ID!
  $address: MailingAddressInput!
  $setAsDefault: Boolean
) {
  customerAddressUpdate(
    customerId: $customerId
    addressId: $addressId
    address: $address
    setAsDefault: $setAsDefault
  ) {
    address {
      id
      address1
      city
      country
      countryCodeV2
      province
      provinceCode
      zip
      formattedArea
    }
    userErrors {
      field
      message
    }
  }
}
