mutation StoreCreditConformanceCustomerCreate($input: CustomerInput!) {
  customerCreate(input: $input) {
    customer {
      id
      email
      displayName
      storeCreditAccounts(first: 5) {
        nodes {
          id
          balance {
            amount
            currencyCode
          }
        }
        pageInfo {
          hasNextPage
          hasPreviousPage
        }
      }
      queriedStoreCreditAccounts: storeCreditAccounts(first: 5, query: "currency_code:CHF") {
        nodes {
          id
          balance {
            amount
            currencyCode
          }
        }
        pageInfo {
          hasNextPage
          hasPreviousPage
          startCursor
          endCursor
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
