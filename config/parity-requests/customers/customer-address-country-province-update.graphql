mutation CustomerAddressCountryProvinceUpdate($input: CustomerInput!) {
  customerUpdate(input: $input) {
    customer {
      id
      email
      defaultAddress {
        id
        address1
        city
        country
        countryCodeV2
        province
        provinceCode
        zip
        formattedArea
      }
    }
    userErrors {
      field
      message
    }
  }
}
