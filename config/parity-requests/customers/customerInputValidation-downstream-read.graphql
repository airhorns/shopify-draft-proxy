query CustomerInputValidationDownstream(
  $id: ID!
  $identifier: CustomerIdentifierInput!
  $query: String!
  $first: Int!
) {
  customer(id: $id) {
    id
    firstName
    lastName
    displayName
    email
    locale
    note
    verifiedEmail
    taxExempt
    tags
    state
    canDelete
    defaultEmailAddress {
      emailAddress
    }
    defaultPhoneNumber {
      phoneNumber
    }
    createdAt
    updatedAt
  }
  customerByIdentifier(identifier: $identifier) {
    id
    firstName
    lastName
    displayName
    email
    locale
    note
    verifiedEmail
    taxExempt
    tags
    state
    canDelete
    defaultEmailAddress {
      emailAddress
    }
    defaultPhoneNumber {
      phoneNumber
    }
    createdAt
    updatedAt
  }
  customers(first: $first, query: $query, sortKey: UPDATED_AT, reverse: true) {
    nodes {
      id
      firstName
      lastName
      displayName
      email
      locale
      note
      verifiedEmail
      taxExempt
      tags
      state
      canDelete
      defaultEmailAddress {
        emailAddress
      }
      defaultPhoneNumber {
        phoneNumber
      }
      createdAt
      updatedAt
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
  customersCount {
    count
    precision
  }
}
