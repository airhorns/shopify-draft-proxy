query OrderCreateLineItemFieldsDownstreamRead($id: ID!) {
  order(id: $id) {
    id
    subtotalPriceSet {
      shopMoney {
        amount
        currencyCode
      }
    }
    totalDiscountsSet {
      shopMoney {
        amount
        currencyCode
      }
    }
    currentTotalPriceSet {
      shopMoney {
        amount
        currencyCode
      }
    }
    lineItems(first: 5) {
      nodes {
        id
        title
        quantity
        sku
        customAttributes {
          key
          value
        }
        requiresShipping
        taxable
        vendor
        product {
          id
        }
        originalUnitPriceSet {
          shopMoney {
            amount
            currencyCode
          }
        }
        discountAllocations {
          allocatedAmountSet {
            shopMoney {
              amount
              currencyCode
            }
          }
        }
      }
    }
  }
}
