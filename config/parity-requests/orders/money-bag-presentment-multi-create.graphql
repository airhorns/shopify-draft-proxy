mutation MoneyBagPresentmentMultiCreate($order: OrderCreateOrderInput!) {
  orderCreate(order: $order) {
    order {
      totalPriceSet {
        shopMoney {
          amount
          currencyCode
        }
        presentmentMoney {
          amount
          currencyCode
        }
      }
      lineItems(first: 5) {
        nodes {
          originalUnitPriceSet {
            shopMoney {
              amount
              currencyCode
            }
            presentmentMoney {
              amount
              currencyCode
            }
          }
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
