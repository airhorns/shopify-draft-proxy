query ReverseLogisticsDeliveryMutationHydrate($id: ID!) {
  reverseDelivery(id: $id) {
    __typename
    id
    reverseFulfillmentOrder {
      __typename
      id
      status
      order {
        id
      }
      lineItems(first: 50) {
        nodes {
          __typename
          id
          totalQuantity
          fulfillmentLineItem {
            id
            lineItem {
              id
              variant {
                id
              }
            }
          }
          dispositions {
            __typename
            id
            type
            quantity
            createdAt
            location {
              id
            }
          }
        }
      }
    }
    reverseDeliveryLineItems(first: 50) {
      nodes {
        __typename
        id
        quantity
        reverseFulfillmentOrderLineItem {
          id
        }
        dispositions {
          __typename
          id
          type
          quantity
          createdAt
          location {
            id
          }
        }
      }
    }
    deliverable {
      __typename
      ... on ReverseDeliveryShippingDeliverable {
        tracking {
          number
          url
          carrierName
        }
        label {
          publicFileUrl
          createdAt
          updatedAt
        }
      }
    }
  }
}
