mutation DisposeReverseShipmentLine($dispositionInputs: [ReverseFulfillmentOrderDisposeInput!]!) {
  reverseFulfillmentOrderDispose(dispositionInputs: $dispositionInputs) {
    reverseFulfillmentOrderLineItems {
      id
      remainingQuantity
      dispositionType
    }
    userErrors {
      field
      message
    }
  }
}
