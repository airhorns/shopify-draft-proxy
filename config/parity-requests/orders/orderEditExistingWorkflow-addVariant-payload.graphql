mutation OrderEditExistingWorkflowAddVariantPayload(
  $id: ID!
  $variantId: ID!
  $quantity: Int!
  $locationId: ID
  $allowDuplicates: Boolean
) {
  orderEditAddVariant(
    id: $id
    variantId: $variantId
    quantity: $quantity
    locationId: $locationId
    allowDuplicates: $allowDuplicates
  ) {
    calculatedLineItem {
      title
      quantity
      currentQuantity
      sku
      variant {
        id
      }
      originalUnitPriceSet {
        shopMoney {
          amount
          currencyCode
        }
      }
    }
    orderEditSession {
      id
    }
    userErrors {
      field
      message
    }
  }
}
