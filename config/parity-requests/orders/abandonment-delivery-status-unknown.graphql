mutation AbandonmentDeliveryStatusUnknown($abandonmentId: ID!, $marketingActivityId: ID!) {
  abandonmentUpdateActivitiesDeliveryStatuses(
    abandonmentId: $abandonmentId
    marketingActivityId: $marketingActivityId
    deliveryStatus: SENT
  ) {
    abandonment {
      id
      emailState
      emailSentAt
    }
    userErrors {
      field
      message
    }
  }
}
