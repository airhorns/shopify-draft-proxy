mutation OrderUpdateSnapshotStagingCreate($order: OrderCreateOrderInput!, $options: OrderCreateOptionsInput) {
  orderCreate(order: $order, options: $options) {
    order {
      id
      name
      updatedAt
      email
      phone
      poNumber
      note
      tags
      customer {
        id
        email
        displayName
      }
      customAttributes {
        key
        value
      }
      shippingAddress {
        firstName
        lastName
        address1
        address2
        company
        city
        province
        provinceCode
        country
        countryCodeV2
        zip
        phone
      }
      lineItems(first: 5) {
        nodes {
          id
          title
          quantity
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
