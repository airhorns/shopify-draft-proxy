mutation OrderReturnStatusReturnDecline($input: ReturnDeclineRequestInput!) {
  returnDeclineRequest(input: $input) {
    return {
      id
      name
      status
      closedAt
      decline {
        reason
        note
      }
      totalQuantity
      returnLineItems(first: 10) {
        nodes {
          id
          quantity
          processedQuantity
          unprocessedQuantity
        }
      }
      order {
        id
        name
        returnStatus
        returns(first: 10) {
          nodes {
            id
            name
            status
            closedAt
            totalQuantity
            returnLineItems(first: 10) {
              nodes {
                id
                quantity
                processedQuantity
                unprocessedQuantity
              }
            }
          }
        }
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
