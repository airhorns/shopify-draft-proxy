query OrdersOrderHydrate($id: ID!, $lineItemsAfter: String) {
  order(id: $id) {
    id
    name
    email
    note
    tags
    customAttributes { key value }
    customer { id email displayName }
    billingAddress { firstName lastName address1 city provinceCode countryCodeV2 zip }
    shippingAddress { firstName lastName address1 city provinceCode countryCodeV2 zip }
    currencyCode
    presentmentCurrencyCode
    displayFinancialStatus
    displayFulfillmentStatus
    currentTotalPriceSet { shopMoney { amount currencyCode } }
    totalPriceSet { shopMoney { amount currencyCode } }
    totalTaxSet { shopMoney { amount currencyCode } }
    totalDiscountsSet { shopMoney { amount currencyCode } }
    discountCodes
    lineItems(first: 10, after: $lineItemsAfter) {
      nodes {
        id
        title
        name
        quantity
        currentQuantity
        sku
        variantTitle
        requiresShipping
        taxable
        customAttributes { key value }
        originalUnitPriceSet { shopMoney { amount currencyCode } }
        originalTotalSet { shopMoney { amount currencyCode } }
        variant { id title sku }
        taxLines { title rate priceSet { shopMoney { amount currencyCode } } }
      }
      pageInfo { hasNextPage hasPreviousPage startCursor endCursor }
    }
  }
}
