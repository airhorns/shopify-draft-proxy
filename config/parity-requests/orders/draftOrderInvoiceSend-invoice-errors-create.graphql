mutation DraftOrderInvoiceSendInvoiceErrorsCreate {
  draftOrderCreate(
    input: { lineItems: [{ title: "Invoice error parity item", quantity: 1, originalUnitPrice: "1.00" }] }
  ) {
    draftOrder {
      id
      status
      email
      invoiceUrl
    }
    userErrors {
      field
      message
    }
  }
}
