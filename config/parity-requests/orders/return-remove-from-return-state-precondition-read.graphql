query RemoveFromReturnStatePreconditionRead($returnId: ID!, $orderId: ID!) {
  return(id: $returnId) {
    id
    name
    status
    totalQuantity
    returnLineItems(first: 5) {
      nodes {
        id
        quantity
        processedQuantity
        unprocessedQuantity
      }
    }
    reverseFulfillmentOrders(first: 5) {
      nodes {
        id
        lineItems(first: 5) {
          nodes {
            id
            totalQuantity
          }
        }
      }
    }
  }
  order(id: $orderId) {
    id
    returns(first: 5) {
      nodes {
        id
        name
        status
        totalQuantity
        returnLineItems(first: 5) {
          nodes {
            id
            quantity
            processedQuantity
            unprocessedQuantity
          }
        }
        reverseFulfillmentOrders(first: 5) {
          nodes {
            id
            lineItems(first: 5) {
              nodes {
                id
                totalQuantity
              }
            }
          }
        }
      }
    }
  }
}
