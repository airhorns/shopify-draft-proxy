query ReturnCalculationOrderHydrate($id: ID!) {
  order(id: $id) {
    id
    name
    createdAt
    updatedAt
    currencyCode
    presentmentCurrencyCode
    displayFinancialStatus
    displayFulfillmentStatus
    totalPriceSet {
      shopMoney {
        amount
        currencyCode
      }
      presentmentMoney {
        amount
        currencyCode
      }
    }
    lineItems(first: 50) {
      nodes {
        id
        title
        quantity
        originalUnitPriceSet {
          shopMoney {
            amount
            currencyCode
          }
          presentmentMoney {
            amount
            currencyCode
          }
        }
      }
    }
    fulfillments(first: 50) {
      id
      status
      displayStatus
      createdAt
      updatedAt
      fulfillmentLineItems(first: 50) {
        nodes {
          id
          quantity
          lineItem {
            id
            title
            originalUnitPriceSet {
              shopMoney {
                amount
                currencyCode
              }
              presentmentMoney {
                amount
                currencyCode
              }
            }
            variant {
              id
            }
          }
        }
      }
    }
    returns(first: 50) {
      nodes {
        id
        name
        status
        totalQuantity
        returnLineItems(first: 50) {
          nodes {
            ... on ReturnLineItem {
              id
              quantity
              fulfillmentLineItem {
                id
              }
            }
          }
        }
      }
    }
  }
}
