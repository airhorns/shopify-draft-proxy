mutation DraftOrdersSearchSortCreate($input: DraftOrderInput!) {
  draftOrderCreate(input: $input) {
    draftOrder {
      id
      name
      email
      status
      tags
      createdAt
      updatedAt
      customer {
        id
        email
        displayName
      }
      totalPriceSet {
        shopMoney {
          amount
          currencyCode
        }
      }
      lineItems(first: 5) {
        nodes {
          title
          sku
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
