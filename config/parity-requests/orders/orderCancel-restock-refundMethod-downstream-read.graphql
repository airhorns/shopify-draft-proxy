query OrderCancelRestockRefundMethodDownstreamRead($id: ID!) {
  order(id: $id) {
    id
    name
    closed
    closedAt
    cancelledAt
    cancelReason
    cancellation {
      staffNote
    }
    displayFinancialStatus
    displayFulfillmentStatus
    paymentGatewayNames
    totalOutstandingSet {
      shopMoney {
        amount
        currencyCode
      }
    }
    currentTotalPriceSet {
      shopMoney {
        amount
        currencyCode
      }
    }
    netPaymentSet {
      shopMoney {
        amount
        currencyCode
      }
    }
    totalReceivedSet {
      shopMoney {
        amount
        currencyCode
      }
    }
    totalRefundedSet {
      shopMoney {
        amount
        currencyCode
      }
    }
    refunds {
      id
      totalRefundedSet {
        shopMoney {
          amount
          currencyCode
        }
      }
      transactions(first: 5) {
        nodes {
          kind
          status
          gateway
          amountSet {
            shopMoney {
              amount
              currencyCode
            }
          }
        }
      }
    }
    transactions {
      kind
      status
      gateway
      amountSet {
        shopMoney {
          amount
          currencyCode
        }
      }
    }
    fulfillmentOrders(first: 5) {
      nodes {
        id
        status
        requestStatus
        lineItems(first: 5) {
          nodes {
            id
            totalQuantity
            remainingQuantity
            lineItem {
              id
              title
              quantity
              fulfillableQuantity
            }
          }
        }
      }
    }
  }
}
