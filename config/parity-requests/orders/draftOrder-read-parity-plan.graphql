query DraftOrderReadParityPlan($id: ID!) {
  draftOrder(id: $id) {
    id
    name
    invoiceUrl
    status
    ready
    email
    customer {
      id
      email
      displayName
    }
    taxExempt
    taxesIncluded
    reserveInventoryUntil
    paymentTerms {
      id
      overdue
      dueInDays
      paymentTermsName
      paymentTermsType
      translatedName
    }
    tags
    customAttributes {
      key
      value
    }
    appliedDiscount {
      title
      description
      value
      valueType
      amountSet {
        shopMoney {
          amount
          currencyCode
        }
      }
    }
    billingAddress {
      firstName
      lastName
      address1
      city
      provinceCode
      countryCodeV2
      zip
      phone
    }
    shippingAddress {
      firstName
      lastName
      address1
      city
      provinceCode
      countryCodeV2
      zip
      phone
    }
    shippingLine {
      title
      code
      custom
      originalPriceSet {
        shopMoney {
          amount
          currencyCode
        }
      }
      discountedPriceSet {
        shopMoney {
          amount
          currencyCode
        }
      }
    }
    createdAt
    updatedAt
    subtotalPriceSet {
      shopMoney {
        amount
        currencyCode
      }
    }
    totalPriceSet {
      shopMoney {
        amount
        currencyCode
      }
    }
    totalDiscountsSet {
      shopMoney {
        amount
        currencyCode
      }
    }
    totalShippingPriceSet {
      shopMoney {
        amount
        currencyCode
      }
    }
    totalQuantityOfLineItems
    lineItems(first: 5) {
      nodes {
        id
        title
        name
        quantity
        sku
        variantTitle
        custom
        requiresShipping
        taxable
        customAttributes {
          key
          value
        }
        appliedDiscount {
          title
          description
          value
          valueType
          amountSet {
            shopMoney {
              amount
              currencyCode
            }
          }
        }
        originalUnitPriceSet {
          shopMoney {
            amount
            currencyCode
          }
        }
        originalTotalSet {
          shopMoney {
            amount
            currencyCode
          }
        }
        discountedTotalSet {
          shopMoney {
            amount
            currencyCode
          }
        }
        totalDiscountSet {
          shopMoney {
            amount
            currencyCode
          }
        }
        variant {
          id
          title
          sku
        }
      }
    }
  }
}
