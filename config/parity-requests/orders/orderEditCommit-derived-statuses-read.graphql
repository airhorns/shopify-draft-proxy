query OrderEditCommitDerivedStatusesRead($id: ID!) {
  order(id: $id) {
    id
    displayFinancialStatus
    displayFulfillmentStatus
    totalOutstandingSet {
      shopMoney {
        amount
        currencyCode
      }
    }
    totalPriceSet {
      shopMoney {
        amount
        currencyCode
      }
    }
    currentTotalPriceSet {
      shopMoney {
        amount
        currencyCode
      }
    }
  }
}
