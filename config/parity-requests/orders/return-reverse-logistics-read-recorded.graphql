query ReturnReverseLogisticsReadRecorded(
  $returnId: ID!
  $orderId: ID!
  $reverseDeliveryId: ID!
  $reverseFulfillmentOrderId: ID!
) {
  return(id: $returnId) {
    id
    name
    status
    totalQuantity
    returnLineItems(first: 5) {
      nodes {
        id
        quantity
        processedQuantity
        unprocessedQuantity
      }
    }
  }
  order(id: $orderId) {
    id
    name
    returns(first: 5) {
      nodes {
        id
        name
        status
        totalQuantity
      }
    }
    returnsFirst: returns(first: 1) {
      nodes {
        id
        name
        status
        totalQuantity
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
    }
    returnsFiltered: returns(first: 5, query: "status:OPEN") {
      nodes {
        id
        name
        status
        totalQuantity
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
    }
  }
  reverseDelivery(id: $reverseDeliveryId) {
    id
    reverseDeliveryLineItems(first: 5) {
      nodes {
        quantity
        reverseFulfillmentOrderLineItem {
          id
          totalQuantity
        }
      }
    }
    deliverable {
      __typename
      ... on ReverseDeliveryShippingDeliverable {
        tracking {
          number
          url
          carrierName
        }
        label {
          publicFileUrl
        }
      }
    }
  }
  reverseFulfillmentOrder(id: $reverseFulfillmentOrderId) {
    id
    status
    lineItems(first: 5) {
      nodes {
        id
        totalQuantity
        dispositions {
          type
          quantity
          location {
            id
          }
        }
      }
    }
    reverseDeliveries(first: 5) {
      nodes {
        id
      }
    }
  }
}
