query OrderCatalogCountRead(
  $tagQuery: String!
  $nameQuery: String!
  $statusQuery: String!
  $idQuery: String!
  $idMissQuery: String!
  $combinedQuery: String!
  $pageSize: Int!
  $seedSize: Int!
  $countLimit: Int
  $unlimited: Int
) {
  seedCatalog: orders(first: $seedSize, query: $tagQuery, sortKey: CREATED_AT, reverse: true) {
    nodes {
      id
      name
      createdAt
      updatedAt
      displayFinancialStatus
      displayFulfillmentStatus
      tags
      email
      currentTotalPriceSet {
        shopMoney {
          amount
          currencyCode
        }
      }
    }
  }
  recent: orders(first: $pageSize, query: $tagQuery, sortKey: CREATED_AT, reverse: true) {
    nodes {
      id
      name
      createdAt
      updatedAt
      displayFinancialStatus
      displayFulfillmentStatus
      tags
      email
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
  oldest: orders(first: $pageSize, query: $tagQuery, sortKey: CREATED_AT, reverse: false) {
    nodes {
      id
      name
      createdAt
      updatedAt
      displayFinancialStatus
      displayFulfillmentStatus
      tags
      email
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
  byName: orders(first: 3, query: $nameQuery, sortKey: CREATED_AT, reverse: true) {
    nodes {
      id
      name
      tags
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
  byId: orders(first: 3, query: $idQuery, sortKey: CREATED_AT, reverse: true) {
    nodes {
      id
      name
      tags
      email
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
  byIdMiss: orders(first: 3, query: $idMissQuery, sortKey: CREATED_AT, reverse: true) {
    nodes {
      id
      name
      tags
      email
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
  byCombinedAnd: orders(first: 3, query: $combinedQuery, sortKey: CREATED_AT, reverse: true) {
    nodes {
      id
      name
      tags
      email
      displayFinancialStatus
      displayFulfillmentStatus
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
  byStatus: orders(first: 3, query: $statusQuery, sortKey: CREATED_AT, reverse: true) {
    nodes {
      id
      name
      displayFinancialStatus
      displayFulfillmentStatus
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
  }
  limitedTaggedCount: ordersCount(query: $tagQuery, limit: $countLimit) {
    count
    precision
  }
  exactTaggedCount: ordersCount(query: $tagQuery, limit: $unlimited) {
    count
    precision
  }
  idMissCount: ordersCount(query: $idMissQuery, limit: $unlimited) {
    count
    precision
  }
  combinedAndCount: ordersCount(query: $combinedQuery, limit: $unlimited) {
    count
    precision
  }
}
