mutation OrderPaymentVoid($id: ID!) {
  transactionVoid(id: $id) {
    transaction {
      id
      kind
      status
      gateway
      paymentId
      paymentReferenceId
      parentTransaction {
        id
        kind
        status
      }
      amountSet {
        shopMoney {
          amount
          currencyCode
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
