mutation ReturnCloseStatePrecondition($id: ID!) {
  returnClose(id: $id) {
    return {
      id
      name
      status
      closedAt
      order {
        id
        updatedAt
      }
      returnLineItems(first: 5) {
        nodes {
          id
          quantity
          processedQuantity
          unprocessedQuantity
        }
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
