mutation OrderEditResidualWorkflowAddShippingLine($id: ID!, $shippingLine: OrderEditAddShippingLineInput!) {
  orderEditAddShippingLine(id: $id, shippingLine: $shippingLine) {
    calculatedOrder {
      id
      totalPriceSet {
        shopMoney {
          amount
          currencyCode
        }
      }
      shippingLines {
        id
        title
        stagedStatus
        price {
          shopMoney {
            amount
            currencyCode
          }
        }
      }
    }
    calculatedShippingLine {
      id
      title
      stagedStatus
      price {
        shopMoney {
          amount
          currencyCode
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
