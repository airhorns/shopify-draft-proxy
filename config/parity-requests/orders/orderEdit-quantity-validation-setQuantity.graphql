mutation OrderEditQuantityValidationSetQuantity(
  $id: ID!
  $lineItemId: ID!
  $quantity: Int!
  $restock: Boolean
) {
  orderEditSetQuantity(id: $id, lineItemId: $lineItemId, quantity: $quantity, restock: $restock) {
    calculatedOrder {
      id
      lineItems(first: 10) {
        nodes {
          id
          title
          quantity
          sku
          variant {
            id
          }
          originalUnitPriceSet {
            shopMoney {
              amount
              currencyCode
            }
            presentmentMoney {
              amount
              currencyCode
            }
          }
        }
      }
      addedLineItems(first: 10) {
        nodes {
          id
          title
          quantity
          sku
          variant {
            id
          }
        }
      }
    }
    calculatedLineItem {
      id
      title
      quantity
      sku
      variant {
        id
      }
      originalUnitPriceSet {
        shopMoney {
          amount
          currencyCode
        }
        presentmentMoney {
          amount
          currencyCode
        }
      }
    }
    orderEditSession {
      id
    }
    userErrors {
      field
      message
    }
  }
}
