mutation OrderEditCommitHistoryFulfillmentCommit($id: ID!, $notifyCustomer: Boolean, $staffNote: String) {
  orderEditCommit(id: $id, notifyCustomer: $notifyCustomer, staffNote: $staffNote) {
    order {
      id
      name
    }
    successMessages
    userErrors {
      field
      message
    }
  }
}
