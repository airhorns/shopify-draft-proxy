mutation ReverseFulfillmentOrderDisposeRecorded($dispositionInputs: [ReverseFulfillmentOrderDisposeInput!]!) {
  reverseFulfillmentOrderDispose(dispositionInputs: $dispositionInputs) {
    reverseFulfillmentOrderLineItems {
      id
      totalQuantity
      dispositions {
        type
        quantity
        location {
          id
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
