query DiscountAutomaticDetailRead($id: ID!) {
  discountNode(id: $id) {
    id
    discount {
      __typename
      ... on DiscountAutomaticBasic {
        title
        status
        summary
        startsAt
        endsAt
        createdAt
        updatedAt
        asyncUsageCount
        discountClasses
        combinesWith {
          productDiscounts
          orderDiscounts
          shippingDiscounts
        }
        context {
          __typename
          ... on DiscountBuyerSelectionAll {
            all
          }
        }
        customerGets {
          value {
            __typename
            ... on DiscountPercentage {
              percentage
            }
          }
          items {
            __typename
            ... on AllDiscountItems {
              allItems
            }
          }
          appliesOnOneTimePurchase
          appliesOnSubscription
        }
        minimumRequirement {
          __typename
          ... on DiscountMinimumQuantity {
            greaterThanOrEqualToQuantity
          }
          ... on DiscountMinimumSubtotal {
            greaterThanOrEqualToSubtotal {
              amount
              currencyCode
            }
          }
        }
      }
    }
  }
}
