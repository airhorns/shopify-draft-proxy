mutation DiscountEntitlementConnectionsVariantUpdate(
  $variantProductId: ID!
  $variants: [ProductVariantsBulkInput!]!
) {
  productVariantsBulkUpdate(productId: $variantProductId, variants: $variants) {
    productVariants {
      id
      title
      sku
      product {
        id
        title
      }
    }
    userErrors {
      field
      message
      code
    }
  }
}
