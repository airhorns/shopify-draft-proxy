mutation DiscountCodeActivateNoopIdempotence($id: ID!) {
  discountCodeActivate(id: $id) {
    codeDiscountNode {
      id
      codeDiscount {
        __typename
        ... on DiscountCodeBasic {
          startsAt
          endsAt
          status
          updatedAt
        }
      }
    }
    userErrors {
      field
      message
      code
      extraInfo
    }
  }
}
