mutation BulkDeleteSetup($input: DiscountCodeBasicInput!) {
  discountCodeBasicCreate(basicCodeDiscount: $input) {
    codeDiscountNode {
      id
      codeDiscount {
        ... on DiscountCodeBasic {
          codes(first: 10) {
            nodes {
              id
              code
            }
          }
        }
      }
    }
    userErrors {
      field
      message
      code
      extraInfo
    }
  }
}
