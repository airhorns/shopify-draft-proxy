mutation DiscountAutomaticBasicLifecycleUpdate($id: ID!, $input: DiscountAutomaticBasicInput!) {
  discountAutomaticBasicUpdate(id: $id, automaticBasicDiscount: $input) {
    automaticDiscountNode {
      id
      automaticDiscount {
        __typename
        ... on DiscountAutomaticBasic {
          title
          status
          startsAt
          endsAt
          combinesWith {
            productDiscounts
            orderDiscounts
            shippingDiscounts
          }
          customerGets {
            value {
              __typename
              ... on DiscountAmount {
                amount {
                  amount
                  currencyCode
                }
                appliesOnEachItem
              }
            }
            items {
              __typename
              ... on AllDiscountItems {
                allItems
              }
            }
            appliesOnOneTimePurchase
            appliesOnSubscription
          }
          minimumRequirement {
            __typename
            ... on DiscountMinimumSubtotal {
              greaterThanOrEqualToSubtotal {
                amount
                currencyCode
              }
            }
          }
        }
      }
    }
    userErrors {
      field
      message
      code
      extraInfo
    }
  }
}
