mutation CustomerMergeAttachedResourcesParity($one: ID!, $two: ID!, $override: CustomerMergeOverrideFields) {
  customerMerge(customerOneId: $one, customerTwoId: $two, overrideFields: $override) {
    resultingCustomerId
    job {
      id
      done
    }
    userErrors {
      field
      message
      code
    }
  }
}
