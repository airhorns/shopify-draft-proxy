mutation PubSubWebhookSubscriptionUpdateMissingProjectTopic(
  $id: ID!
  $webhookSubscription: PubSubWebhookSubscriptionInput!
) {
  pubSubWebhookSubscriptionUpdate(id: $id, webhookSubscription: $webhookSubscription) {
    webhookSubscription {
      id
    }
    userErrors {
      field
      message
    }
  }
}
