mutation EventBridgeWebhookSubscriptionUpdateParity(
  $id: ID!
  $webhookSubscription: EventBridgeWebhookSubscriptionInput!
) {
  eventBridgeWebhookSubscriptionUpdate(id: $id, webhookSubscription: $webhookSubscription) {
    webhookSubscription {
      id
      topic
      callbackUrl
      uri
      format
      includeFields
      metafieldNamespaces
      filter
      createdAt
      updatedAt
      endpoint {
        __typename
        ... on WebhookHttpEndpoint {
          callbackUrl
        }
        ... on WebhookEventBridgeEndpoint {
          arn
        }
        ... on WebhookPubSubEndpoint {
          pubSubProject
          pubSubTopic
        }
      }
    }
    userErrors {
      field
      message
    }
  }
}
