mutation WebhookSubscriptionApiVersionCreate(
  $topic: WebhookSubscriptionTopic!
  $webhookSubscription: WebhookSubscriptionInput!
) {
  webhookSubscriptionCreate(topic: $topic, webhookSubscription: $webhookSubscription) {
    webhookSubscription {
      id
      topic
      format
      uri
      callbackUrl
      createdAt
      updatedAt
      apiVersion {
        handle
        displayName
        supported
      }
    }
    userErrors {
      field
      message
    }
  }
}
