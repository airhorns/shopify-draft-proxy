query LocalizationTranslationsMutationNoopValidationRead($resourceId: ID!) {
  shopLocales {
    locale
    name
    primary
    published
  }
  translatableResource(resourceId: $resourceId) {
    resourceId
    translatableContent {
      key
      value
      digest
      locale
      type
    }
    translations(locale: "it") {
      key
      value
      locale
      outdated
      market {
        id
      }
    }
  }
}
