query LocalizationTranslationsMarketScopedRead(
  $resourceId: ID!
  $marketId: ID!
  $resourceIds: [ID!]!
  $marketsFirst: Int!
) {
  translatableResource(resourceId: $resourceId) {
    resourceId
    translatableContent {
      key
      value
      digest
      locale
      type
    }
    translations(locale: "es", marketId: $marketId) {
      key
      value
      locale
      outdated
      updatedAt
      market {
        id
      }
    }
  }
  byIds: translatableResourcesByIds(first: 10, resourceIds: $resourceIds) {
    nodes {
      resourceId
      translatableContent {
        key
        value
        digest
        locale
        type
      }
    }
  }
  markets(first: $marketsFirst) {
    nodes {
      id
      name
      handle
      status
      type
    }
  }
  allShopLocales: shopLocales {
    locale
    name
    primary
    published
    marketWebPresences {
      id
      subfolderSuffix
    }
  }
}
