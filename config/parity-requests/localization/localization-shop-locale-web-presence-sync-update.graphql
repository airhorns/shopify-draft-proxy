mutation LocalizationShopLocaleWebPresenceSyncUpdate($locale: String!, $shopLocale: ShopLocaleInput!) {
  shopLocaleUpdate(locale: $locale, shopLocale: $shopLocale) {
    shopLocale {
      locale
      published
      marketWebPresences {
        id
      }
    }
    userErrors {
      field
      message
    }
  }
}
