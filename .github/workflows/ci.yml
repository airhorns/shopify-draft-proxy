name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: write

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Rust build and cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Rust format check
        run: cargo fmt --check

      - name: Rust clippy
        run: cargo clippy --all-targets --all-features -- -D warnings -D clippy::ignore-without-reason

      - name: Check for ignored Rust tests
        shell: bash
        run: |
          set -o pipefail
          cargo test --all-targets -- --ignored --list | awk '/^[^[:space:]].*: test$/ { print; found=1 } END { if (found) exit 42 }'
          status=$?
          if [ "$status" -eq 42 ]; then
            echo "Ignored Rust tests are not allowed. Remove the ignore attribute or remove the defunct test." >&2
            exit 1
          fi
          exit "$status"

      - name: Rust tests
        run: cargo test --all-targets

      - name: Rust proxy path benchmarks
        run: cargo bench --bench proxy_paths -- --sample-size 10 --measurement-time 1 --warm-up-time 1

  node:
    name: Node.js / TypeScript
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '22'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Node smoke and interop tests build and launch the Rust server, so keep a
      # Rust cache here even though the Rust test suite runs in its own job.
      - name: Cache Rust build and cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Resolve pnpm store path
        shell: bash
        run: echo "PNPM_STORE_PATH=$(corepack pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-pnpm-

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Check protected evidence invariants
        run: corepack pnpm conformance:fixture-invariants

      - name: Lint TypeScript interop and tooling
        run: corepack pnpm lint

      - name: Typecheck TypeScript interop and tooling
        run: corepack pnpm typecheck

      - name: Check conformance metadata
        run: corepack pnpm conformance:check

      - name: Check remaining TypeScript conformance capture tooling
        run: corepack pnpm conformance:capture:check

      - name: Find latest main conformance baseline
        id: main_conformance_baseline
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: corepack pnpm exec tsx ./scripts/find-main-conformance-baseline.ts

      - name: Download latest main conformance baseline
        if: github.event_name == 'pull_request' && steps.main_conformance_baseline.outputs.found == 'true'
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ steps.main_conformance_baseline.outputs.run_id }}
          artifact-ids: ${{ steps.main_conformance_baseline.outputs.artifact_id }}
          path: .conformance/main
          merge-multiple: true

      - name: Fall back to checked-in main conformance baseline
        if: github.event_name == 'pull_request' && steps.main_conformance_baseline.outputs.found != 'true'
        run: |
          mkdir -p .conformance/main
          echo "No main conformance baseline artifact found; PR status will omit the baseline comparison."

      - name: Generate conformance status report
        id: conformance_status
        run: >
          corepack pnpm conformance:status --
          --baseline .conformance/main/conformance-status-report.json
          --output-json .conformance/current/conformance-status-report.json
          --output-markdown .conformance/current/conformance-status-comment.md

      - name: Build TypeScript interop output
        run: corepack pnpm build

      - name: Node ESM consumer smoke
        run: corepack pnpm test

      - name: Find latest main parity baseline
        id: main_parity_baseline
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >
          corepack pnpm exec tsx ./scripts/find-main-conformance-baseline.ts
          --artifact-name parity-results-main

      - name: Download latest main parity baseline
        if: github.event_name == 'pull_request' && steps.main_parity_baseline.outputs.found == 'true'
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ steps.main_parity_baseline.outputs.run_id }}
          artifact-ids: ${{ steps.main_parity_baseline.outputs.artifact_id }}
          path: .parity/main
          merge-multiple: true

      - name: Run full parity suite
        run: >
          corepack pnpm parity:run --
          --allow-failures
          --output-json .parity/current/parity-results.json

      - name: Reject new parity failures
        if: github.event_name == 'pull_request' && steps.main_parity_baseline.outputs.found == 'true'
        run: >
          corepack pnpm parity:check-regressions --
          --current .parity/current/parity-results.json
          --baseline .parity/main/parity-results.json

      - name: Note missing main parity baseline
        if: github.event_name == 'pull_request' && steps.main_parity_baseline.outputs.found != 'true'
        run: echo "No main parity baseline artifact found; this run cannot distinguish existing failures from regressions."

      - name: Upload main conformance baseline
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: conformance-status-main
          path: .conformance/current/conformance-status-report.json
          if-no-files-found: error
          retention-days: 90

      - name: Upload main parity baseline
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: parity-results-main
          path: .parity/current/parity-results.json
          if-no-files-found: error
          retention-days: 90

      - name: Add or update PR conformance comment
        if: github.event_name == 'pull_request' && always() && steps.conformance_status.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: corepack pnpm exec tsx ./scripts/upsert-pr-conformance-comment.ts --body-file .conformance/current/conformance-status-comment.md

  ruby:
    name: Ruby
    runs-on: ubuntu-latest
    env:
      RUBY_VERSION: '3.3'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The native extension is built by `rake smoke`; cache its cargo registry
      # and the target/ruby-native build dir the Rakefile compiles into.
      - name: Cache Rust build and cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target/ruby-native

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: ruby

      - name: Ruby Minitest smoke
        working-directory: ruby
        run: bundle exec rake smoke

      # The catalog-importer example consumes the gem the way a real embedder
      # would (official shopify_api client → intercepted HTTP → in-process
      # proxy). `rake smoke` above already built the native extension into
      # ruby/lib, which the example loads via its path-gem dependency.
      - name: Cache catalog importer example gems
        uses: actions/cache@v4
        with:
          path: examples/catalog-importer/vendor/bundle
          key: ${{ runner.os }}-rb-${{ env.RUBY_VERSION }}-example-${{ hashFiles('examples/catalog-importer/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-rb-${{ env.RUBY_VERSION }}-example-

      - name: Install catalog importer example dependencies
        working-directory: examples/catalog-importer
        run: |
          bundle config set --local path vendor/bundle
          bundle install --jobs 4

      - name: Catalog importer example end-to-end tests
        working-directory: examples/catalog-importer
        run: bundle exec rake test

  python:
    name: Python
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: '3.11'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # `uv run` builds the maturin/PyO3 extension via cargo; cache the registry
      # and build artifacts (the crate compiles into python/target).
      - name: Cache Rust build and cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: python

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            python/uv.lock
            python/pyproject.toml

      # `uv run` builds the maturin/PyO3 extension from the in-repo Rust crate
      # (Rust is preinstalled on the runner) and runs the binding test suite:
      # the host-language transport smoke tests plus the existing round-trips.
      - name: Python tests
        run: uv run --project python --extra test pytest
