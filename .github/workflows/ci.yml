name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: write

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '22'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Resolve pnpm store path
        shell: bash
        run: echo "PNPM_STORE_PATH=$(corepack pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-pnpm-

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Check protected evidence invariants
        run: corepack pnpm conformance:fixture-invariants

      - name: Rust format check
        run: corepack pnpm rust:fmt

      - name: Rust clippy
        run: corepack pnpm rust:clippy

      - name: Rust tests
        run: corepack pnpm rust:test

      - name: Rust proxy path benchmarks
        run: corepack pnpm rust:bench

      - name: Lint TypeScript interop and tooling
        run: corepack pnpm lint

      - name: Typecheck TypeScript interop and tooling
        run: corepack pnpm typecheck

      - name: Check conformance metadata
        run: corepack pnpm conformance:check

      - name: Check remaining TypeScript conformance capture tooling
        run: corepack pnpm conformance:capture:check

      - name: Find latest main conformance baseline
        id: main_conformance_baseline
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: corepack pnpm exec tsx ./scripts/find-main-conformance-baseline.ts

      - name: Download latest main conformance baseline
        if: github.event_name == 'pull_request' && steps.main_conformance_baseline.outputs.found == 'true'
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ steps.main_conformance_baseline.outputs.run_id }}
          artifact-ids: ${{ steps.main_conformance_baseline.outputs.artifact_id }}
          path: .conformance/main
          merge-multiple: true

      - name: Fall back to checked-in main conformance baseline
        if: github.event_name == 'pull_request' && steps.main_conformance_baseline.outputs.found != 'true'
        run: |
          mkdir -p .conformance/main
          echo "No main conformance baseline artifact found; PR status will omit the baseline comparison."

      - name: Generate Rust conformance status report
        id: conformance_status
        run: >
          corepack pnpm conformance:status --
          --baseline .conformance/main/conformance-status-report.json
          --output-json .conformance/current/conformance-status-report.json
          --output-markdown .conformance/current/conformance-status-comment.md

      - name: Build TypeScript interop output
        run: corepack pnpm build

      - name: Node ESM consumer smoke
        run: corepack pnpm test

      - name: Upload main conformance baseline
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: conformance-status-main
          path: .conformance/current/conformance-status-report.json
          if-no-files-found: error
          retention-days: 90

      - name: Add or update PR conformance comment
        if: github.event_name == 'pull_request' && always() && steps.conformance_status.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: corepack pnpm exec tsx ./scripts/upsert-pr-conformance-comment.ts --body-file .conformance/current/conformance-status-comment.md

  ruby:
    name: Ruby
    runs-on: ubuntu-latest
    env:
      RUBY_VERSION: '3.3'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: ruby

      - name: Ruby Minitest smoke
        working-directory: ruby
        run: bundle exec rake smoke
