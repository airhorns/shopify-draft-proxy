name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  gleam:
    name: Gleam
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Setup BEAM (Erlang + Elixir + Gleam)
        uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          elixir-version: '1.18'
          gleam-version: '1.16.0'

      - name: Resolve pnpm store path
        shell: bash
        run: echo "PNPM_STORE_PATH=$(corepack pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-node-22-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-22-pnpm-

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Gleam format check
        run: corepack pnpm gleam:format:check

      - name: Gleam tests and parity specs (JavaScript target)
        run: corepack pnpm gleam:test:js

      - name: Gleam tests and parity specs (Erlang target)
        run: corepack pnpm gleam:test:erlang

      - name: Node ESM consumer smoke
        run: corepack pnpm gleam:smoke:js

      - name: Elixir BEAM interop smoke
        run: corepack pnpm elixir:smoke
