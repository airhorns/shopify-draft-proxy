name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Resolve pnpm store path
        shell: bash
        run: echo "PNPM_STORE_PATH=$(corepack pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Restore pnpm store cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-node-22-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-22-pnpm-

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Check worklist
        run: corepack pnpm worklist:check

      - name: Check conformance coverage
        run: corepack pnpm conformance:check

      - name: Build
        run: corepack pnpm build

      - name: Test
        run: corepack pnpm test
