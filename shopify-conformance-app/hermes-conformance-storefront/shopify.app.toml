# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "17cd70053d5d5bf63576c50e1bedbd9f"
name = "hermes-conformance-storefront"
application_url = "https://shopify.dev/apps/default-app-home"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

[access_scopes]
# This app is dedicated to Storefront API conformance recording.  The
# unauthenticated scopes become the grants on its provisioned Storefront token.
scopes = "read_products,unauthenticated_read_checkouts,unauthenticated_write_checkouts,unauthenticated_read_customers,unauthenticated_write_customers,unauthenticated_read_customer_tags,unauthenticated_read_content,unauthenticated_read_metaobjects,unauthenticated_read_product_inventory,unauthenticated_read_product_listings,unauthenticated_read_product_pickup_locations,unauthenticated_read_product_tags,unauthenticated_read_selling_plans"

[auth]
redirect_urls = ["https://shopify.dev/apps/default-app-home/api/auth", "http://127.0.0.1:13388/auth/callback"]
