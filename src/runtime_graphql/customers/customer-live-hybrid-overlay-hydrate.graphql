query CustomerOverlayCatalogHydrate($query: String) {
  customers(first: 250, query: $query) {
    nodes {
      id
      firstName
      lastName
      displayName
      email
      phone
      legacyResourceId
      locale
      note
      canDelete
      verifiedEmail
      dataSaleOptOut
      taxExempt
      taxExemptions
      state
      tags
      numberOfOrders
      createdAt
      updatedAt
      defaultEmailAddress {
        emailAddress
        marketingState
        marketingOptInLevel
        marketingUpdatedAt
      }
      defaultPhoneNumber {
        phoneNumber
        marketingState
        marketingOptInLevel
        marketingUpdatedAt
        marketingCollectedFrom
      }
      emailMarketingConsent {
        marketingState
        marketingOptInLevel
        consentUpdatedAt
      }
      defaultAddress {
        id
        firstName
        lastName
        address1
        address2
        city
        company
        province
        provinceCode
        country
        countryCodeV2
        zip
        phone
        name
        formattedArea
      }
      addressesV2(first: 250) {
        nodes {
          id
          firstName
          lastName
          address1
          address2
          city
          company
          province
          provinceCode
          country
          countryCodeV2
          zip
          phone
          name
          formattedArea
        }
      }
    }
  }
}
